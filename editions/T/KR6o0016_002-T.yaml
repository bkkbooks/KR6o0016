body:
  text: 因明四種相違略私上下文云論法差別至如臥具等述曰准前亦三此初二也云云自下釋法差別相違也准前法自相有三初標牒名次顯宗因後成違義也次文云凡二差別名相違者非法有法上除言所陳餘一切義皆是差別要是兩宗各各隨應因所成立意之所許所諍別義方名差別因令相違名相違因云云意何答此釋差別相違義也凡二者法差別有法差別也意云今言差別者非法有法言陳之外餘一切義皆名差別只是立敵兩人因所成立意中所許若所諍之別義方名差別因令其相違故名相違因爲言次文云若不爾者如立聲無常宗聲之上可聞不可聞等義無常之上作彼縁性等如是一切皆謂相違因令相違名爲彼因若爾便無相違因義云云意何答若不云非餘一切義皆名差別唯立敵意中所許諍名差別者聲無常宗聲上有可聞不可聞等多種差別無常之上有作彼縁性非彼縁性等多種差別如是一切差別皆謂相違以因令相違名差別相違因若爾即無相違因義所以者何以非所諍一切差別義作相違失故既非本意故爲言問且其可聞及非彼縁性等者意何答周後記有二釋一云聲是可聞聲上無我非可聞義二云能詮聲縁合即可聞不合即不可聞也云云清記只有後釋也後記云作彼縁性等者無常聲而是其境與彼縁聲無常之心作性不與彼縁色無常之心作性亦是無常上差別之義云云次文云比量相違等皆准此釋云云意何答明燈抄云比量相違相違決定有二差別皆准此釋云云意云約前比量相違相違決定皆有四種其各法差別有法差別皆准此相違因二種差別可釋謂以兩所許別義爲差別非取宗上一切義爲差別爲言有先徳義不如今釋也文云此中義説若數論外道對佛弟子意欲成立我爲受者受用眼等云云此將出法差別相違作法先明立敵及欲立量之本意也故云此中義説也數論者劫初時有外道名劫比羅此云黄赤色仙人鬢髮面色皆黄赤故其弟子十八部中上首者名筏里渉此云雨雨際生故其黨名雨衆梵云僧佉奢薩怛羅此名數論以智數數度諸法從數起論論能生數亦名數論其師説二十五諦法矣次文云若我爲有法受用眼等便有宗中所別不成積聚性因兩倶不成如臥具喩所立不成云云此文意何答此先預簡三支失也意云彼數論師云若以我爲有法以受用眼等爲能別立量者即可有三失爲言問其三失有方何答云我者即神我也以此神我爲有法者敵者佛弟子不許神我故即有宗中他所別不成所別必用立敵共許法故又立者數論神我云不積聚敵者佛弟子不云神我故立敵倶不許積聚性故因遍有法故有兩倶不成又同喩臥具是非受用眼等物故不成能可受用眼等所立宗故有所立不成也問且就兩倶不成言兩倶不成者有有法體立敵倶不許因遍有法云兩倶不成而今此量觀敵者佛弟子無有法體故不可云不許因遍有法而何云有兩倶不成答約兩倶不成有多種今所問其一種也亦有雖無有法體成兩倶不成義有體兩倶無體兩倶二種別故今此量理亦可有他所依不成望敵者佛弟子無有法所依故因有所依不成今此疏文省繁略也故纂云准法師云若立眞我受用眼等即所別不成積聚性因兩倶不成明前所立兩倶不成亦有所依不成等故兩倶不成不必有法唯有云云次文云若言眼等必爲我用能別不成闕無同喩積聚性因違法自相臥具喩有所立不成云云此文意何答此亦案立可有失也意云以眼等爲有法以神我爲能別者即有三失爲言問其三失何答以神我爲能別者敵者佛弟子不立神我故有能別不成有能別不成故有闕無同喩意云不成神我用之能別何有同喩故闕同喩也積聚性因不成神我受用宗法故有法自相相違以臥具爲喩之時其臥具是非神我受用物故不成所立宗故有所立不成也問且就闕無同喩三十三過中無闕無同喩過而何云有闕無同喩答爾也三十三過中非別失是即能別不成上義故問爾云意何答敵者本不言神我受用故神我受用之能別不成能別不成何有同喩明知闕無同喩是能別不成之上義也問古徳云闕無同喩是所立不成而何今云能別不成上義耶答且古徳義不爾言所立不成者有喩此喩不成所立宗之名也既云闕無同喩依有何物不成所立宗云所立不成耶故不可也問古徳云有喩依無喩體只言所立不成喩依喩體倶無言闕無同喩所立不成而何違此義答此義尤謬約所立不成有四種謂兩倶隨一猶預所依也初三種有喩依無喩體第四所依不成之所立不成者喩依喩體倶無其喩依喩體倶無者非謂闕無同喩立論者以敵論者不成法爲同喩之時同喩不成此言喩依喩體倶無所依不成之所立不成豈是闕無同喩乎故疏説所依不成之所立不成云所依不成者彼聲論師對大乘立量擧微爲喩此闕所依所依既無所立亦闕以大乘不立微故云云即此文意云聲論師對大乘立聲常時以極微爲同喩而大乘本不立極微故此喩不成此所依不成也不同因所依不成至下自知之此喩所依極微不成故喩體常義亦無故亦不成所立常宗故言所依不成之所立不成也爲言此義殊勝尤可祕之喩依者瓶空等喩體常無常等也餘准知之問其積聚性因有法自相失方何答眼等者有法自相必爲我用者法自相也積聚性故因不成神我受用爲與彼相違假我受用宗成因臥具是非神我用物故即爲異喩因轉彼同無異有闕後二相故作能違云眼等不爲神我受用積聚性故如臥具等也問佛弟子不云神我何言不爲神我受用答爲破於他就他宗立故不成失也問法自相相違者有法自相依因令相違所有失此既望敵者無法自相何言法自相相違答分別自他共之時無過意云此望立者自法自相相違故能違就他宗作之多有古徳傳今不依之次文云若成眼等爲假他用相符極成云云意何答此亦簡過詞也意云敵者佛弟子眼等知爲假我他被用仍若立眼等爲假他被用有相符失爲言相符亦名立已成意云相符我意又立我已成事有何所詮故爲失爲言次文云由此方便矯立宗云眼等必爲他用眼等有法指事顯陳爲他用法方便顯示意立必爲法之差別不積聚他實我受用云云此文意何答此正數論師簡過已後立量之詞也此只陳有法及法宗也次文云若顯立云不積聚他用能別不成所立亦不成闕無同喩因違法自相故須方便立積聚性因積多極微成眼等故如臥具喩其床座等是積聚性彼此倶許爲他受用故得爲同喩云云此明以方便矯避過立宗及用因喩之詞也如文易知之問此能別不成等過既上以神我受用爲能別可有所以皆出畢何更重顯豈非無用耶答上先案立將可避失之樣此還明已避失之志故非無用也即量云眼等必爲他用積聚性故猶如臥具異喩如龜毛等眼等臥具至下當釋之次文云同喩之法不應分別故總建立云云意何答此明因明道理也意云因明之旨因喩之法不應分別故積聚性因不可分別若眼等極微之積聚若床座極微之積聚又臥具喩不可分別眞他用之臥具若假他用之臥具故總立積聚性因臥具喩爲言文云論此因如能至積聚他用述曰此成違義有二初擧所違法差別因後釋所由此初也初文又二此因如能成立眼等必爲他用此牒前因能立所立法之自相如是亦能下又顯此因亦能與彼法差別爲相違因云云自下明勘失竝作能違也如文悉之次文云其數論師眼等五法即五知根臥具床座即五唯量所集成法不積聚他謂實神我體常本有其積聚他即依眼等所立假我無常轉變云云此明數論宗立二十五諦法也二十五諦者一自性亦名冥性名勝性二大増長義也三我執即亦自性起用觀察我知我用境故云我執也四聲五觸六色七味八香此五名五唯量量者定義九地十水十一火十二風十三空此五名五大十四眼十五耳十六鼻十七舌十八皮此五名五知根十九語具二十手二十一足二十二大便處二十三小便處此五名五作業根二十四心平等根體即心也又云淨肉團色也二十五我知者即神我也次文云然眼等根不積聚他實我用勝親用於此受五唯量故由依眼等方立假我故積聚我用眼等劣其臥具等必其神我須思量受用故從大等次第成之云云此明二十五諦中神我受用餘二十三諦法也除自性諦故從大等次第成之者由我起思受用境界從自性先生大大者増長義自性相増長名爲大從大生我執我執生五唯量唯量生五大五大生五知根次生五作業根次生心根具如唯識疏次文云若以所思實我用勝假我用劣然以假我安處所須方受床座故於臥具假他用勝實我用劣云云自下正案立臥具所受用義本量付失將欲作相違也意云神我思量床座等極微所集成之義殊勝眼等積聚所成之假我思量床座集成之義最劣然色等五唯量集成臥具等正是爲假我之安息處止也故正受用床座等假我是勝實我是劣也爲言次文云今者陳那即以彼因與所立法勝劣差別而作相違非法自相亦非法上一切差別皆作相違故論但言與所立法差別相違云云此明陳那菩薩案立彼數論意許勝劣差別作相違失也如文可悉之次文云先牒前因能成所立法自相云此前所説積聚性因如能成立數論所立眼等有法必爲他用法之自相即指此因如是亦能成立所立宗法自相意許差別相違之義積聚他用宗云云此即審定數論因次即例破也意云論云此因如能乃至他用者數論所立積聚性因如成立彼眼等有法及必爲他用法自相此因亦能成立彼法自相下意許差別不積聚他用相違積聚他用之宗爲言明燈抄云宗由由者因由也有人云由字屬下者非也云云今謂且不依之可見之次文云由他用是法自相此自相上意之所許積聚他用不積聚他用是法差別彼積聚因今更不改還即以彼成立意許法之差別積聚他用云云此正勘過作能違也次文云其臥具等積聚性故既爲積聚假我用勝眼等亦是積聚性故應如臥具亦爲積聚假我用勝云云此文下疏主得陳那意作用勝難以釋義旨也問爾約此量勘付法差別相違作能違方何答眼等者有法自相也必爲他用者法自相也此法自相下爲神我他用勝假我他用劣者是法差別也立者意許爲立神我他用勝宗而同喩臥具是假我他用勝之物非神我他用勝之物望意許宗成宗異品積聚性故因轉彼同無異有闕後二相故作能違云眼等必爲假我他用勝積聚性故如臥具等也次文云若不作此勝用難者其宗即有相符極成他宗眼等亦許積聚假他用故云云此陳若不加勝言難即有相符失之所以彼數論亦許眼等假他用故也此文亦嫌文軌師也彼師不作勝言故也次文云但可難言假他用勝不得難言實我用劣違自宗故共比量中無同喩故若他比量一切無遮云云此文意云就能違量但可云眼等必爲假我他用勝不可云爲實我用劣所以者何違自宗故此共比量無同喩故故邑記云本量既云眼等他用是共比量今相違量理亦須共若云眼等實我用劣佛法既無實我即犯違宗及能別過闕無同喩云云若他比量一切無遮者若置汝言此即無失爲言文云西域諸師有不善者此直申差別相違過云眼等應爲積聚他用因喩同前云云此文來意如何答爲表不加勝言作能違人有失所以此文來也不善者者不善因明義又不善數論宗故名不善者也問西域師如何案數論本計作此能違答西域師案數論本計云必爲他用之法自相上雖有眞他用假他用之意許差別然彼數論本意唯以眞他用爲所樂爲約假他用所不樂爲也約床座等無所取捨二他通用也故今見床座等二他通用不欲取眞他用捨假他用之意樂以眼等例同床座等爲顯彼數論之失作能違云眼等爲積聚他用積聚性故如臥具等也次文云數論難云汝宗相符誰説眼等積聚他不用云云此數論師難彼西域師之能違有相符失也即數論意云誰云我數論云不眼等爲積聚他用今我云眼等亦爲積聚他用故汝所立宗有相符失爲言次文云西域又釋數論眼等唯爲不積聚他用床座通二他用故今以臥具例令眼等亦爲積聚他用無相符失云云此釋意何答此彼西域師之轉救前釋也即意云先雖案數論本計不開詞言唯作能違故既被相符失故今爲避相符失開詞細明彼數論計及陳作能違之由也謂西域師云汝數論師必爲他用之下雖含眞他假他之意許差別然實所成立唯是眼等唯爲不積聚他用之宗也約同喩床座等無有取捨云二他通用故我今以許床座等二他通用相例作眼等亦爲積聚他用如床座等之能違曾無相符失爲言次文云數論難云陳那弟子非善我宗神我受用三徳所成二十三諦豈於眼等無能受用云云此文意何答此數論師重難西域師之詞也明燈抄云數論難云陳那弟子非善我宗今我本意不論眼等眞假二他用不用義唯論眼等有能用他即神我是陳那弟子不知我本意唯諍眞假兩他用不用義倶有相符豈於我宗善達者耶云云重意云眼等積集云假我故假我用眼等之義顯然共知但不積聚神我亦能用眼等此義隱故難知依之今爲令了知神我必受用眼等眼等有能用之他立此量也其能用他者即神我也何以知者神我受用三徳所成二十三諦其二十三諦中有五知根豈於眼等無能用之他乎今以成立此義爲論不論眼等眞他用假他不用等之義而汝不得我意謂成立眼等二他用不用義惡作能違故有相符豈達我宗耶爲言此義幽微不可異求之次文云唯識亦云執我是思受用薩埵刺闍答摩所成大等二十三法由此眼等實我亦用云云此文來意何答此引證成立神我受用眼等之義也我是思者實我體即思也能思慮者即是我也薩埵者有情義及勇義取後也刺闍者微義及塵義取後也答摩者闇鈍義也此等古人之義新人云此三徳如次名黄赤黒亦名瞋癡名樂苦捨也具如唯識疏也問以此文如何證耶答彼論既云我受用三徳所成大等二十三諦由此明知眼等實我亦受用也言亦用者亦於假我也故知約眼等假我用義從元共知實我用義所未共知爲令了知數論師對佛弟子立此量也已上疏主遙賛數論假設此難也次文云故但應如前所分別不應於中生異覺云眼等唯爲實他受用臥具假用或眼等通二臥具唯假用云云此文意何答此疏主上出餘師義不得論意畢還成自義并破他非也言故但應如前所分別者指上定勝劣作能違也言不應於中等下密破文軌師等也問其破文軌師之意何答彼師疏云問彼宗眼等豈不亦爲假他用耶此成已立何名相違答彼數論宗諸臥具等爲假他用眼等但爲眞他受用乃至又釋彼宗亦許眼等實法爲假他用同佛法宗然成相違者此中立宗應云眼等唯爲積聚能他用等云云此答有二釋今慈恩云不可云眼等唯爲實他受用臥具假用者即難初釋也次云不可云或眼等通二臥具唯假用者即難後釋也文軌第二釋云亦許者其亦字者兼并義以實我爲本亦兼假我也唯爲者其唯言者通下臥具也明燈抄之義也然約此西域釋唐朝日本古徳云云甚多前後兩釋多云二釋隨即案數論本計任意參差就後釋周後記云此中疏錯與下數論難不相當乃至上不積者不字餘也下爲積者不字少也前餘後少等云云獻記清記亦復如是又以不應於中等文配煩彼西域二釋如此之衆義忽難依憑後審之間以今義爲正之又案以文軌師二釋充西域二釋以初充後以後充初以二異覺難如充文軌釋相配得其意可和會之然不如前之次文云勝義七十對金七十亦徴彼云必爲他用是何他耶若説積他犯相符過若不積他能別不成闕無同喩臥具爲喩所立不成亦即此中法差別過云云此文意何答此以勝義七十論文爲證正明此法差別相違之旨了也意云勝義七十論徴詰金七十論云眼等必爲他用者其他者何他耶若云積聚他用者敵者佛弟子本已成故有相符失若云不積聚他用者敵者不成故有能別不成等失云云明知必爲他用下含眞他假他之意許差別是則此法差別相違失也爲言此過等者如上釋也言勝義七十論者世親菩薩造對金七十論故云勝義也金七十論者數論弟子所造也造七十行頌獻於國王王賞賜金故爲號也文云問於因三相是何過耶云云意何答爲表闕後二相之由發此問也問爾其答如何次文云答彼立因意成非積聚他用勝其積聚他用勝即是異品宗無同喩佛法都無不積聚他故積聚性因於異品有此顯定是九句之中異有同無故成相違闕第二相同品定有亦闕第三異品遍無云云此答也如文可知之文云論諸臥具等爲積聚他所受用故述曰此釋所由成比量云眼等必爲積聚他用勝積聚性故如臥具等諸非積聚他用勝者必非積聚性如龜毛等故今難云諸臥具等兩宗共許爲積聚他受用勝故云云此正作能違量及明合離也但言諸非積聚等者明離也若合云諸積聚性物是積聚他用勝如臥具等今臥具等兩宗共許爲積聚他用勝故以爲喩也次文云論雖無勝字量義意必然不須異求應作此解云云此文意云論中雖不云用勝此量義意必然如此更勿成異解可信此解爲言謂疏主能得論意也已上法差別相違了文云論有法自相相違因者如説有性非實非徳非業有一實故有徳業故如同異性述曰准前作三此即初二標名擧宗因云云此有法自相相違作法也次文云鵂鶹因縁如前已説云云此明立量主也成劫之末有外道仙人其有三名一嗢露迦此云鵂鶹晝隱夜行故二蹇拏僕此云米齊依夜驚産婦遂居碓下食米齊故三吠世史此云勝論造六句論勝於諸論故具如中卷次文云時彼仙人既悟所證六句義法謂證菩提便欣入滅但嗟所悟未有傳人乃至徐説先悟六句義法云云此明勝論及五頂之本縁也向文易知之次文云説實徳業彼皆信之至大有句彼便生惑云云此明師主説六句義弟子信不信之由也六句義者一實句二徳句三業句四有句五同異句六和合句也説初三句弟子皆信之説第四大有句弟子不信也次文云仙言有者能有實等離實徳業三外別有體常是一弟子不從云實徳業性不無即是能有豈離三外別有能有云云此師弟論有句之即離也如文易知之次文云仙人便説同異句義能同異彼實徳業三云云此依弟子猶不信有句師主且置有句更説同異和合句先令信此同異和合離實等有之由然後以證成道理欲令信有句也此先説同異句也次文云此三之上各各有一總同異性隨應各各有別同異如是三中隨其別類復有總別諸同異性體常衆多云云此釋同異性有實徳業三上實上令同令異義也明燈抄云同異有二謂總同異及別同異總同異中復有二種謂總同總異初總同者實句之中雖有九實同是實故總同於此名爲總同言總異者實中九實總異徳業名爲總異別同異中復有二種謂別同別異也別同者地水火等一一極微各各不同名爲別是實故別同於此名爲別同言別異者實中九實各各別異名爲別異別異於此名爲別異諸同異性體常衆多徳業同異准實可説今謂復有總別諸同異性者約實中地大雖有子孫等集成一地故名別是同微故名同也別異者子孫別故名別別即異故名異也徳業准之次文云復有一常能和合性和合實徳業令不相離互相屬著云云此説和合句也如文可知之問何故同異性體衆多和合句體是一耶答大有和合諸法通體非各別性故名爲一同異句義諸法別性非是通體故名爲多十句論云有性和合體唯是一徳業同異三唯是多實句一種亦多亦一云云次文云五頂雖信同異和合然猶不信別有大有鵂鶹便立論所陳量云云此如文可悉之次文云此量有三實徳業三各別作故今指彼論故言如説云云此釋論之如説言也三量者一有性非實有一實故如同異性異喩如實句二有性非徳有徳故如同異性異喩如徳句三有性非業有業故如同異性異喩如業句然論後二量因云有徳業故者略故合也略纂及周記具説之次文云有性有法非實者法合名爲宗云云此下且就初一量明三支中是明宗也次文云此言有性仙人五頂兩所共許實徳業上能非無性故成所別若説大有所別不成因犯隨一此之有性體非即實云云此文意何答明有法有性非離實非即實共許有性之所以也意云若離實有即實有者可有失故爲言問其失何答離實大有弟子不成故有他所別不成失又立離實大有時有一實因亦成大有故弟子不成故有他隨一不成也若即實有者有違宗相符失也爲言問爾此兩所共許能非無之有者其體何物答非離實非即實之有性也問爾即離二外有別體歟答古徳云云不同也或云非即離二外有別有奄含即離云有性時師主思離實有弟子思即實有兩倶相許是云兩所共許之有云云或云即離二有之外有共許有合有三有云云問以何爲正答初傳違斷文云誰言五頂有性含即離等故難依之後傳可勝也問爾其共許有體何答古徳唯云有第三共許有不陳其體計之可口傳之今案西大寺別當貞松房云師主初爲五頂説教有實句有徳句有業句乃至有同異句有和合句弟子隨即信有實徳業等其有言非離實有非即實有是即師弟共許有也是即世間云有云無有無之有也是云第三共許之有云云故略纂云非無之義共許爲有此之有性是有法體故云云此義幽微後學必信之可祕之文云因云有一實故勝論六句束爲四類一無實二有一實三有二實四有多實云云此文意何答此釋有一實故因也此四類中今取第二有一實爲因爲言其由至次下可知之次文云地水火風父母常極微空時方我意并徳業和合皆名無實四本極微體性雖多空時等五體各唯一皆無實因徳業和合雖依於實和合於實非以爲因故此等類並名無實云云此釋四類中第一類名無實之由也言無實者互不相有不含容他故名無實此有二義一無實因故名無實二不以實爲因故名無實謂地水等四劫初爲根本衆多散起非從實生故無實因空時等五自然而有非從微生故亦無實因故此九實名無實因也雖徳業依於實和合和合於實不從實生故不以實爲因故此三種名不以實爲因也問徳是實上徳豈不以實爲因耶答徳業雖依實而不以實爲因有別體故如人依地住而地非人因也次文云大有同異名有一實倶能有於一一實故云云此釋四類中第二類名有一實之所以也言一一實者九實也可知之問大有同異既含常散四大及含空等五何故不名有多實耶答此所含中實自守各不相含是九箇一既不相攝故不名多也然亦名有多實等其由尤殊也次文云至劫成初兩常極微合生第三子微雖體無常量徳合故不越因量名有二實自類衆多各各有彼因二極微之所生故云云此釋四類中第三類名有二實之義也謂成劫初有兩常極微未合之時名爲父母已合之時即名子微望未合二名爲第三雖從他生故其體無常然徳句中量徳合故不越父母因量有父母二實故名有二實也雖自類衆多各有二因二微所生故名有二實也次文云自此已後初三三合生第七子七七合生第十五子如是展轉生一大地皆名有多實有多實因之所生故云云此釋四類中第四類名有多實之義也謂從第三子微以後三三子二合生第七子七七子二合生第十五子如是展轉乃至成三千大千世界地大乃至水火風等極微亦復如是成三千世界水火等大其三千界既從父母二性所生其量合等於父母量故三千界爲識等境體唯是一合也此等名有多實也有多實因之所生故也第七子以後皆名孫微今名子者隨近名也次文云大有同異能有諸類亦得名爲有無實有二實有多實云云此文意何答先四類中名有一實者是大有同異也是依有九實所得之名也然此大有同異有十一無實故除和合亦名有無實有子微故亦名有二實有孫微故亦名有多實也此中擧先有一實爲因者至下可知之次文云然此三種實等雖有功能各別皆有大有令體非無皆有同異令三類別云云此文意何答此文意釋大有同異有此無實二實多實之義也意云三種實等者此上所擧無實二實多實也功能各別者無實因名無實有二實名有二實有多實名有多實此即依各別功能各得名也雖如是功能各別然皆有大有有此令其體非無有同異有此令其體各別爲言是平備仁修大徳等之義意也此能會文相可依之明詮僧都用此義也周記云三種者實徳業也云云明詮導書所引也明燈抄云然此二種實等雖有等者此二種者大有及同異也實等雖有此之二種而功能異如文可知云云此抄意與前義尤殊也然此義雖無殊難見文筆體前義勝也次文云名有一實有徳業者亦有無有非大有也若是大有因成隨一同異非喩能立不成云云此文意何答此文釋因之有一實有徳業之有言也謂因云有一實等者其有者亦是有無有非大有之有也言亦者亦上言此言有性仙人五頂兩所共許能非無性之文也問設是大有者有何失答若是大有之有者弟子不成故有他隨一不成失又同異性非大有故非同喩即不成能立因故喩有能立不成也然諸記中以名有一實四字牒爲上末以有徳業者等爲下文初者此有二難一云見疏上下文句雜亂恐不愜作者之志歟二云因有三種何故唯釋有徳業之有共許之義忘初有一實之有乎若言言亦者亦有一實之有者上文未擧有一實有是有無之有義何言亦乎故知尤非也可依先義也次文云如佛法言有色有漏有漏之有能有之法能有所有煩惱漏體猶如大有能有實等有色之言如有一實及有徳等無別能有而有於色此色體上有其色義云云此文意何答此文爲顯因無隨一不成之由乘便更引喩釋有性及有一實等義也問其引喩釋意何答且周記云有色有漏等者此汎爾出大有有體及實等三法體非無也大有有如有漏之有若實等三法體非是無如有色有色即有故及空有聲有聲即空故此是擧喩也有色之有配因大有有配宗有法有色有者色體上有質礙義屬著於色色有礙故名爲有色乃至實徳業三亦爾體非無故名之爲有非三之外別有能有此有是敵者所許之有也有漏有者心王及遍行等體非是漏爲他漏成漏心王等得有漏名煩惱是能漏心王等是所漏煩惱喩大有心王等喩實等言能有之法者此釋煩惱漏體能漏所漏之法大有亦爾能有所有之法云云此文云能漏所漏者疏外之義以能有所有可爲正也今謂大有名有性者能有他實等故也譬如佛法中有漏法能有他煩惱漏體故名爲有漏也又有一實有徳業者以實等體非無名有一實等非有別能有故名有一實等譬如佛法中有色之法自有色義故名有色非有別能有有色義故名爲有色爲言問就有色喩今如文義是説即實有也何不違師主義答此明共許義也非即實有亦非離實也意云師主初爲五頂説教有實句有徳業句時弟子亦信了今謂其言有實等者即如云有色等之言今引此有色喩顯前有實等之義也前共許之義今引喩顯者爲明以彼爲因無隨一不成也問師主初言有實等其有義屬著實等猶如有色者既是即實有豈不違師義答師主意云實等上下不無有者不名爲有是大有之功能云有也大有之體雖離實等能有之功能屬實等上由實等體不無是蒙大有之力也猶如色等上不無不名爲有是大種之功能也大種之體雖離色等能造之功能屬色等上由色等體之不無是蒙大種之力故也問若爾有一實等破文如何答先後殊也若約初爲弟子説訓者可讀有一實有徳業是令領解之詞也若約爲因訓者可讀有於一實故有於徳業故是成宗之詞也問如後訓者既爲有別能有豈順五頂意耶答初説有實等之時師弟共許之後言有於一實故等之時師主存有大有有於一實等弟子存不無有有一實等故是共許悉順兩意耳此是愚推向師可問之次文云如空有聲非空之外別有能有但是屬著法體之言云云此文意何答是又爲顯有一實等共許有所引喩也如文易知之問引有色喩足顯共許有何更重引豈非無用答無妨爲顯一法引一喩或爲顯一法引多喩是聖教之例也或説者之意略或作者之言勢如法華經中引譬如月諸星中王等十種喩明法華經之殊勝最勝王經中云如來舍利白如珂雪𤘽物頭花等引種種喩顯一法豈是無用耶然或古徳云有色喩引内教爲喩也空有聲喩引外教爲喩其證云十句論云空有聲云云今檢十句正文云空何謂唯有聲名空云云故知先徳意樂尤深義旨未詳之然者先徳釋此有漏有色有聲之喩其義繁多正否難辨委學之者可見廣私記也次文云是故於因無隨一過有一一實故更不須徴即實離實之有一實況復此因不應分別應分別者便無同喩云云此文意何答此上引喩釋有一實等共許義故明以此義故因無隨一不成也謂既以共許有無有爲有一實故等因更不可推徴即實之有一實離實之有一實何況因明旨因喩之法不應分別若猶分別即實離實者即無共同喩也文云問何故不言有於無實二實多實云云此問意何答且就此有法自相所違量有三箇問答此第一問也即意云勝論六句分爲四類何故唯以有一實爲因不言以無實有二實有多實爲因耶爲言問其答何次文云答若言有於二實多實云何得以非實爲宗其因便有不定之失爲如同異有二多實故彼有性非實爲如子微等有二多實故有性是實由此不言有二多實云云此其答也答有二此即第一明若以有二多實爲因可有失也謂若以有二多實爲因即非實之宗難成其因有不定故不定如文可知故不言以有二多實爲因也問若以有二多實爲因者有不定者以有一實爲因亦可有不定謂爲如同異性有一實故有性非是實爲如空時等有一實故有性是實耶答此不定不爾空時等實句自體有自體者唯是弟子所許也非師主所許何以不共許之義作不定耶問若爾何明燈抄云五頂許空等非無體名有一實由此應知有一實因有不定過今此縱無辨相違也云云答此抄文且難信違斷文云不例子微有二實彼此倶成別有子體實上不無之有弟子自許故無不定等之文故也此有二多實之因有兩倶不成等者皆他師之義不可用之次文云若言有無實者和合句義亦名無實若有彼無實犯兩倶不成實等能有上無有無實故其喩亦犯能立不成因亦不遍乍似唯能有於實句之無實故亦欲顯九實一一皆有故言一實能有一一實故云云此第二明若以有無實爲因可有失之答也謂以有無實爲因者有三失一兩倶不成謂無實之類有十二地等九實及徳業和合也今若因無實者總乍十二被擧而有性唯有十一無實不有和合無實無實言下被含和合無實此和合無實有性不有故立敵共不許一分因遍有法有性故有兩倶不成也二能立不成謂同喩同異性亦不有和合無實故不成有無實因一分故有能立不成也三狹因失謂有性寛有十一無實而爲立非實宗用有無實因之時唯取有實句無實之義爲因不取有徳業無實之義故有性似唯有實句無實不有徳業無實故有宗寛因狹失爲言故周記云因亦不遍者若言有無實故爲因乍似唯有實句之無實不含徳業故言乍似唯能等者若言有無實爲言大有唯只能有於實句之無實相似爲言不能有徳業上無實故不言無實也云云問何故有無實因下不關徳業無實答非實宗之時不用有徳業因准之可知若猶關者即有不定謂若如同異性有無實故有性非是實若如實句有無實故有性亦是實也是一分不定也實句有徳業無實故具如斷也問爾此依狹因可有何失答可有兩倶不成謂有性有實徳業無實而有無實故因唯遍有實句無實之義上不遍有徳業無實之義上故立敵不許此因故有兩倶不成也問若爾與前兩倶不成有何別答前是依宗狹因寛所出來兩倶不成也後是依宗寛因狹所出來兩倶不成故尤殊也此因亦不遍之義古徳教也今記愚見也不可異求之問説前兩倶不成周記云此中有二兩倶一分兩倶不成云云其二兩倶不成何答初兩倶不成者十二無實中一分和合句無實云有性有立敵不許故有兩倶一分兩倶不成上兩倶下兩倶是言重也無義後兩倶一分兩倶不成者言實等上不無有有和合無實亦立敵不許故有兩倶一分兩倶不成也問此二兩倶不成有何差別答初兩倶不成望大有所付也後兩倶不成望不無有所付也是其差別也問文答末言欲顯九實等文意何答此兼結釋有一實之一言也謂爲顯有性地等九實一一皆有更加一言爲言問若不言一只言有實有何失答有不定失至下可知之文云問有性有法有一實因不相關預云何不是兩倶不成云云此問意何答周記云此中意顯有性大有名爲有法有一實因即當體不無之有立敵倶不許因有宗有法因法有法既不相關因既於有法上無何故不是兩倶不成云云意云宗有是大有因有是不無有宗因不相關何非兩倶不成耶爲言不依餘記也問其答何次文云答有性有法是實徳業之能有性有一實因能有於一一實故是宗之法故無兩倶云云此答文也問此文意何答實徳業上之能有性立敵共許以此爲有法此實等上之能有性云有實等亦立敵共許故取實等上之能有性能有實等之義爲因是宗之法故無兩倶不成爲言次文云此非實句爲一宗已非徳非業後二宗法有法同前此二因云有徳業故謂能有彼徳之與業如言有色亦屬著義云云此文意何答此非實句爲一宗已者明結釋三量中第一有性非實宗及有一實故因了也後二宗法等下明釋第二非徳宗第三非業宗及二種因也此二量有法如前非徳宗用有徳故因非業宗用有業故因謂徳業上之能有性能有徳及業故也如言有色等者如釋有一實引有色有聲之喩釋有徳業亦可引有色等喩亦屬著義故爲言問後二因云有徳故有業故者何論及疏合云有徳業故答其爲均文句所略合也意云爲均有一實故四言合云有徳業故也若具言者各別可云故周記云三因者即有一實故有徳故有業故也云云或云不合言時有不定失云云此釋謬言也文云問既於徳業一一皆有云何不言有一徳業云云此問意何答約徳句有二十四種約業句有五有性能有其一一徳業何故如云有一實不加一言只云有徳業故耶爲言問其答何次文云答實有多類不言有一但言有實即犯不定謂子微等皆有實故徳業無簡不須一言云云此答文也問此意何答約實有多類謂二實多實等也而若不加一言但言有實寛關二多實若關即有不定失謂爲如同異性有實故有性是非實爲如子孫微有實故有性是實也故用一言約徳業無二徳業多徳業之類故無可簡別故無簡不加一言也諸記義也問何故約實有多類約徳業不爾答且九實中除空時等五地水等四大自成三類謂四大云無實四大所生子微云有二實子微所生孫微云有多實有父母子孫三類故得名各別言約徳業無簡不須一言者何略纂准知應云有一實故有一徳故有一業故文中略故唯實言一也云云答且不可信之彼文有二解之中後解也次文云三因一喩如同異性此於前三一一皆有亦如有性是故爲喩云云此文意何答此釋爲三因以一同異性爲喩之所以也同異性有實徳業之一一亦如有性故以爲喩也以實徳業如次爲異喩耳異喩有能立不遣今縱辨因也次文云仙人既陳三比量已五頂便信法既有傳仙便入滅勝論宗義由此悉行云云是結量本意也如文易知次文云陳那菩薩爲因明之准的作立破之權衡重述彼宗載申過難故今先叙彼比量也云云此爲明能違量先讃陳那菩薩并述天主叙彼量之所以也已上所違量四種相違略私記卷上天延三年乙亥七月五日於鹿苑院自記之或依諸記古徳之義或述自之鄙懷逐聖語則雖無所謬陳愚情則訛錯多端以恐以懼願歸勝義是則爲充溫覺上人法華會竪義料也興福寺釋眞興集于時暦應二年七月二十七日未刻於慈尊院書寫之畢依此功離六路苦域遂往生素懷矣南無法相擁護春日大明神右筆沙門堯專後日一交畢
