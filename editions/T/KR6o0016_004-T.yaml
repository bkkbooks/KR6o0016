body:
  text: 四種相違略私記下下文云此四過中初二種因各唯違一後二種因一因違二云云此文以下後料簡也即明能乖返十五因之類也如文可知之文云其有一因通違三者如勝論立所説有性非四大種許除四大體非無故如色聲等云云此明一因違三之量也問此量本意何答勝論爲成離實大有立自比量也意云四大實句之外有體非無故有離實等之有性爲言次文云自所餘法皆入同喩無不定過云云此文意何答此文意云四大種外餘法皆入同喩故無不定失爲言問其餘法者何物耶答或人云空時方我意徳業和合同異性云所餘法也今謂子孫微等也問以子孫微不入同喩如何可有不定過耶答作不定云爲如色聲等許除四大體非無故所説有性是非四大種爲如子微等許除四大體非無故所説有性是四大種北院僧都云改是四大種可云非非四大種云云問何故以子孫微爲不定敵答子孫微以四大爲體是故以爲自不定過爲簡此過皆入同喩也問由除四大即簡子孫豈得子孫作不定耶答彼宗唯言地水火風父母極微不言地水火風子孫微等由此當知除四大時唯除本微不除子孫故分子孫得作不定也問因明之法立宗之時可成同品之物自然成同品可成異品之物自然成異品以異品之物爲同品非可成同品以同品之物爲異品非可成異品同異二品自然無濫然則子孫等若可成異品者雖云皆入同喩豈變成同品乎若本可成同品者何勞云皆入同喩耶豈非無用耶答爾也至如水火相違之物不待言定自然爲同品爲異品然今約此子孫頗以難判以不名四大故爲非四大種宗即成同品然以四大爲體故亦有可成異品之義故不云皆入同喩敵者以四大爲體之邊勘成異品可作不定失故爲遮此濫云皆入同喩也唯識比量中有可例事可見也問何故因云許除四大耶答言除四大種者云四大之外也故大賢師云所説有性非四大種許四大外體非無故如色聲等云云周記云問云何須説言除四大耶答若但言體非無故不言除四大便有不定謂所説有性爲如色聲等體非無故非四大種爲如四大種體非無故是四大種爲簡是過故因云除四大種云云問就此周記爲簡不定失云除四大歟答爾也問若爾何明燈抄云此解非也疏中卷云以除四大及有性外竝爲同喩無自不定今案彼意不得取宗有法能別作不定過故云以除四大及有性外竝爲同喩非四大種既是能別豈取能別作不定過故因中云除四大者顯四大外體非無故故云除也云云答此抄文意難得所以者何云四大之外云除四大義意無殊倶簡不定之詞也而云豈取能別作不定過其意未得何者以非四大種爲能別四大種即成異品若不云除四大之時體非無故因轉其異品四大種云爲如四大種體非無故有性是四大種既成不定失而何得云豈取能別作不定失一切比量作不定皆如此故此抄意甚以難得也問其一因違三者何答違有法自相有法差別法差別也問何故不違法自相答言顯法自相無過故不違法自相也其由可知之次文云非四大種是法自相能有四大非四大種不能有四大非四大種是法差別彼意本成能有四大非四大種今與彼法差別爲相違云所説有性非能有四大非四大種許除四大體非無故如色聲等云云此明違法差別也問爾闕後二相勘付法差別方何答所説有性者有法自相也非四大種者法自相也此法自相下爲能有四大非四大種不能有四大非四大種者法差別也立者意許爲立能有四大非四大種之宗而同喩色聲等非能有四大非四大種之物故望意許宗成宗異品許除四大體非無故因轉彼同無異有闕後二相作能違云所説有性應非能有四大非四大種因喩如前問其能有四大非四大種不能有四大非四大種者體何物耶答能有四大非四大種者離實大有也不能有四大非四大種者古徳云云不同也或云即實有性也或云即義相違也或云同喩色聲等也云云今謂可云同異性和合性也此二句不能有四大非四大種是立敵所共許故也次文云所説有性是有法自相與此有法自相爲相違云所説有性應非有性許除四大體非無故如色聲等云云此文明有法自相相違也問其有方何答所説有性者有法自相即離實有性而同喩色聲等是離實色聲等非離實有性望有法宗成宗異品許除四大體非無故因轉彼同無異有闕後二相故作能違云所説有性應非有性因喩如前次文云彼説有性離實有性今非此有不犯自語自教相違隨言即非故違自相云云此文意何答明弟子難有性非有性無失也意云今難師主所立離實大有不難共許實等上能非無有故弟子不犯自語相違自教相違此二如上釋可知之又難言顯大有故違自相也次文云有性既是有法自相作有性有縁性作非有性有縁性是有法差別彼意本成作有性有縁性故今與彼有法差別爲相違云有性應非作有性有縁性許除四大體非無故如色聲等云云此文明有法差別也問其有方何答所説有性者有法自相爲作有性有縁性作非有性有縁性者有法差別立者意許爲立作有性有縁性之宗而同喩色聲等非作有性有縁性之物故望意許宗成宗異品許除四大體非無故因轉彼同無異有闕後二相故作能違云所説有性非作有性有縁性因喩如前問其作有縁性作非有縁性者體何物耶答作有縁性者離實大有也作非有縁性者古徳有多義今謂共許有也具如上釋次文云不改本因即爲違量故成違三云云結也文云有唐興雋法師者釋門之樞紐也乃至沖遠天而別羽云云唐興者寺名也雋者靈雋也明抄云似變反諸本遠沖天者文倒也可云沖遠天也已上略而不釋之次文云乃申難曰竊觀論勢文理不同准九因中第四第六名曰相違因於同無皆異品有此四相違唯法自相可與彼同其後三違因皆同有異品上無既不同於四六如何返成相違云云此文雋法師約四相違付二難即一文勢不同難二義勢不同難也此則述初文勢不同難也問此難意何答明燈抄云文勢不同難意云如論文云此中法自相相違因者如説聲常所作性故或勤勇無間所發性故此因唯於異品中有是故相違准理門論九句因中第四第六名曰相違因於同無皆異品有此論所説四相違中唯法自相可與彼論九句因四六違同其後三違法差別因者如説眼等必爲他用積聚性故如臥具等有法自相因者如説有性非實非徳非業有一實故有徳業故如同異性有法差別因者如説有性作有縁性有一實故有徳業故如同異性觀此後三所相違量各具三支因皆同有異品上無既不同於四六如何返成相違云云次文云又法自相他因於同遍無於異品中説有用他異品爲同得成相違之義後之三違他因皆於同有異品上無用他能立因喩與他作三相違行相既自不同如何可得法自相相違與餘三合而言二合違有六三合違有四四合違有一云云是第二義勢不同難也問此難意何答難意云初法自相相違因同無異有以立者異品爲同喩作相違過後三相違因同有異無以立者因喩作相違過行相既別義勢不同何得言法自相與後三合有一因違二違三違四之義耶爲言次文云爾性不隱賢乃至匪發彼之千釣誰發我之萬碩者歟云云諸本云彼發者文倒也可云發彼順下句故也此明親友之芳相知心遣疑生解也次文云夫正因相者必遍宗法同有異無生他決智因法成宗可成四義有法及法此二各有言陳自相意許差別隨宗所諍成一或多故宗同品説所立法均等義品名爲同品隨其所諍所立之法有處名同非取宗上一切皆同若爾便無異喩品故若令皆同亦是分別相似過類又非唯取言所陳法不爾便無自餘過失如前數説故隨所應因成宗中一乃至四所兩競義有此法處名爲同品云云此下通難中有二初明正因相并會違文後此論所説下正通前二難也此先明正因相也問爾此文意何答夫正因相者簡決定相違因等也必遍宗法者遍是宗法性也同有者同品定有性也異無者異品遍無性也生他決智者簡決定相違雖具三相不生決智也此正因法成所立宗可成四義謂有法與法各有言陳意許故也隨宗所諍成一或多者隨兩所諍或唯成法自相一或通成四種宗也故論説所立法均等義品名爲同品也隨其所諍等者邑記云若令一切皆同不但無於同品亦無異品又如有立聲無常宗無我必隨若全同者虚空無我亦入同中故無異喩云云若全皆同等者或本令字作全字謂若強以一切令同者即是分別相似過類也又非唯取等者非唯取言陳爲諍亦取意許若不爾者即無餘差別失也故隨所應乃至名爲同品者結也如文可知之次文云問理門論云但由法故以成其法如何今説因成四耶云云此即爲會違文更發自問也明燈抄云此問意云若言正因成四宗者則以有法爲因所成理門論云但由法故以成其法如何今説因成四耶云云清記云難言既因能成其四宗何故理門不説以法成有法差別等但説以法成法耶云云次文云答實唯成法如難有性而非有性難彼意許離實等有而非有性故唯成法雖難意許尋言即難更不加言故名有法自相相違加言便成難彼差別今望言陳因成宗四理門望諍有法之上意許別義故言但以法成其法理不相違云云此答會違也問此答意何答明燈抄云此答意云若望意許實唯成法且有法自相相違因中如難有性非是有性不難言顯不無有性難彼意許離實等有而非有性故唯成法若爾不可説言有法自相相違難意許故應名差別雖難意許尋言即難更不加言故名有法自相相違若加離實有言便成難彼差別今望言陳必爲他用言陳有性言陳作有縁性因成宗四若望法上意許不積他用有法之意許離實有性作大有縁性差別義唯成其法故言但以法成其法故與彼論理不相違云云問其加言不加言之意何答不加言者所違量只云有性非實隨之能違只云有性非有性此云不加言是云有法自相言加言者若所違量云有性離實有性隨之能違亦云有性非離實有性此云加言是云有法差別也問若爾此疏文云加言不加言者約所違量約能違量歟答古徳云此疏文約能違之量云加言不加言也問若約能違量判加言不加言者何斷云望不加言名有法自相等約所違量判加言不加言耶答古徳云疏斷所望各異各擧一邊故不相違也今謂疏斷倶通所違能違云加言不加言也意云所違量若不加言時能違量亦不加言故云有法自相若所違量加言時能違量亦加言故名差別不可疏與斷各異也問其今望言陳等文意何答若據明燈抄者言陳有四種謂言陳常言陳必爲他用言陳有性言陳作有縁性也故云今望言陳因成宗四也若據周記者其文云今望言陳等者此論據言陳意許即成四宗理門中唯據意許且隱言陳故言成法云云纂云理門望爲量成立必須加言如立大有云有離實等有更無同喩有一實因於同異有即唯異轉違彼後陳總名相違乃至今此論中立四違者望不加言本意所諍言陳意許故有四種云云意同周記也問明燈抄與此纂文既殊可依何之答倶無難故任意耳問次理門望諍等文意何答凡有法差別法差別顯意許諍時皆成法自相今理門論望此義云但以法故成其法也故不相違也爲言文云此論所説法自相因唯違於一故顯示因同無異有自餘三因乍觀他立皆似其因同有異無彼此所諍宗上餘三以理窮之皆無同品其因亦是異有同無如法差別不積聚他用有法自相離實等有性有法差別作大有縁性皆無同喩彼因但於異品上有由彼矯立以異爲同故今違之以彼同爲異以彼異爲同成相違義云云自下正通雋法師二難之中是通初文勢不同難也明燈抄云前所作因唯違此一無常法自相宗不違餘三是故顯擧因同無異有云此因唯於異品中有乃至自餘三因等者敵者同他立者同立所違量主名之爲立能違量主名之爲他後之三因觀他與立皆似其因同有異無乃至所諍餘三以理窮之皆無同品其因亦是異有同無若法差別作所違量云眼等不積聚他用能別不成闕無同喩故彼矯立以異爲同故今違之以彼所違量主同喩爲能違量異喩以彼所違量異喩爲能違量同喩故成相違云云次文云論中示法各各不同法自相相違改他同喩爲異改他異喩爲同後之三違以他同爲同以他異爲異欲顯相違因必仍舊喩或改新云云此文通初難中明論主示法不同也問其他者何答立者觀敵者云他也然明燈抄云敵者名他且初一違改他能違量同喩瓶爲異以他能違量異喩空爲同後之三違以他能違量同喩爲同喩以他能違量異喩爲異喩云云今謂此抄文釋文甚勞況據所違量所釋頗不順疏文既結云欲顯相違因必仍舊喩或改新明知據能違量示法不同也具義如初料簡釋了次文云其不定因立順因正破乃相違因雖不改通二品轉不生決智立不定名此相違因隨應所成立必同無異有破必同有異無決智既生故與前別云云此文意何答此通初難中更通伏難也故明燈抄云此通伏難難云若相違因必須本因其不定因有何差別共不定等須本因故故今通云其不定因立順因正破乃相違如立量云聲應是常所量性故同喩如空異喩如瓶今觀此因於立論者是順因正作不定云爲如空等所量性故聲是常耶爲如瓶等所量性故聲是無常由此應知破乃相違因雖須本二品轉不生決智立不定名此相違因所違因必同無量有能違因必同有異無此理常定本不相濫決智既生是故與前不定因別云云邑記同之不依周記也次文云若立因正破者相違因通二品豈非不定云云意何答此通伏難中重明相違因與不定因別義也周記云此正釋相違不名不定所以相違擧因即令宗有過非破乃成過因同無異有顯不違四六若相違因後彰過通二品豈非不定由此故知不名不定其不定因以下傍乘釋難非正答前問云云次文云故此四因不違四六云云此結也又云其不定因乃至不違四六者若據邑記意者爲難彼雋法師文勢難中云其後三違因皆同有異品上無既不同於四六如何返成相違之難先擧不定與相違別義也故邑記云此將欲難彼唐興法師先張不定與相違義別且如聲爲常所量性故此因同品虚空上有名爲立順因正敵家出過此因亦於異品瓶有返成無常故乃相違因通二品決智不生名爲不定其相違因立者必須同無異有敵者出過必須同有異無決智既生故二差別也若立因正等者此正難也雋公若言後三相違本量之因同有異無者便爲正因敵者破此與理相違若彼立因通於二品智既不決寧非不定故知後三相違本所立因皆是同無異有故與四六不相違也云云問就此記如何可成其意耶答依此記案其不定因等文者雋公難云其後三相違因皆同有異品上無不同四六句同無異有何成相違云云即返難云若如汝言後三相違約立者同有異無是正因者敵者破之時可成不定因而其不定因以理窮之因通二品決智不生此後三相違因以理窮之同無異有決智既生故與不定殊而何得定同有異無不同四六耶若猶云正者正因破者相違者豈非不定而既不爾故不違四六句也爲言此義順文之次文云又將法自相因同無異有就後三種同有異無與三合説一往觀文必無是理初以異爲同後以同爲同故今將後三以就初一以異爲同便有合者改他能立之同喩故云云自下通第二義勢不同難也問此文意何答意云如此論所説初法自相相違以所違量異喩爲能違量同喩後三相違以所違量同喩爲能違量同喩以異爲同與以同爲同既殊故如論文一往觀時初一與後三合違必可無是理初一改喩後三不改喩故然今後三相違與初一合違者約後三相違改喩之量也爲言問若爾論所説後三相違尅性可云改喩可云不改耶答以理窮時亦是改喩望立者意許皆無同喩以異喩矯爲同喩勘過時既成異喩破者以之爲同喩故可云改喩然云後三相違不改喩者一往約論現文不改也如上已釋次文云如勝論立所説有性離實等外有別自性許非無故如同異性云云是出後三相違改喩故與初法自相合一因違四宗量之證也問此量本意何答勝論爲成離實大有對弟子立自比量也所説者我所説也如我執之言也問其許非無者許言若自許之許若共許之許歟答是共許之許也實等上能非無有立敵共許故也問若云自許之許有何過答若一向自比量者無失若自中之共比量者有隨一不成失也次文云乍觀此因是共不定二皆有故云云此文意何答明燈抄云觀此比量非無故因同有異有故共不定爲如同異性所説有性離實等外有外自性爲如實等所説有性離實等外無別自性是故此因成共不定同異二品因皆轉故云云周記云乍看似共不定細細尋乃是異品故言乍云云重意云大底豫見時似共不定故云乍觀等也次文云然彼五頂諍五句外無別自性故立有性離實等五有別自性闕宗同品云云此文意何答此文意明以同異性雖爲同喩尋其實時成異喩之所以也意云此量因二品轉故雖似共不定然彼弟子五頂不許實徳業及同異和合之外有別有性故師主立有性離實徳業同異和合有別自性更無同品故同異性既成異品故非共不定爲言問勝論本意只云離實徳業三有別有性也而何今加同異和合云立離五句有別自性耶答云離實徳業三有別有性約初説六句之次第也意云師主爲弟子説六句之時第一説實句第二説徳句第三説業句此三皆信第四説有句是時不信師主論離實等三別有弟子論離實等三別無爾時師主爲立比量令信超説第五同異句第六和合句此本意即有性離此實徳業及同異和合有別自性爲言故云離實等三者約最初説論其實者立離五句有別自性也次文云其同異性既是異品所離之外由彼勝論方便矯立擧異爲同許非無因唯於異品實等上有同遍非有云云此文意何答此明以異品同異性矯爲同喩之所以也問其所離之外等意何答謂之諸記説不同且周後記有二釋一云同異性云能離大有性云所離同異性所離大有性之外矯立異喩爲同品實是異品因轉彼故成相違一云大有性云能離實等云所離所離實等之中偏取同異性爲同喩故云所離之外實但是異品彼依矯施設故立外名云云清記文同初釋也邑記云應詳此中脱一字謂非之文也應言非所離之外意云其同異性既是異品即非所離五句之外由彼立宗但言離實等不言離五句故彼矯立爲同品耳云云明燈抄云其同異性雖是異品所離之外而彼勝論方便矯立取異爲同等云云問且就此等記意破文方何答先就周記初釋可訓所離之外也就後釋可訓所離之外若依邑記可加非言訓也依明燈抄者可訓所離之外也清記可如周初釋訓也今案此等諸記恐不叶文今疏意云勝論初説實徳業三次説離此三外之有性故以大有爲能離以實徳業三爲所離後説同異性爲立量之同喩也即以所離實徳業爲異喩同異性此三之外物也故立量之時矯只立有性離實離徳離業不云亦離同異和合其同異性爲所離實徳業三之外物方便矯立以爲同喩然而理實諍有性亦離同異和合有其體無其體故師主立量之本意爲成立有性離實等五句有其體而無同喩故方便矯立以異爲同尋本意之時遂成異品因轉彼故自然同無異有成相違也爲言問就此義如何可訓答可訓其同異性既是異品所離之外也此義先徳未傳愚推如此可祕之次文云亦如論説聲常之宗法自相因對無空論闕無同喩所作等因唯於異品瓶等上有同上遍無許成相違今此亦爾云云此文意何答此引喩明闕無同喩成相違之義也意云論所説聲常所作性故如虚空之量對無空論師之時闕無同喩無空論師不立虚空故然所作性因唯異喩瓶上轉同無異有闕後二相故許成相違今此有性量亦復如此立有性離實等五句外有別自性之時闕無同喩許非無故因唯異喩實等五句上轉同無異有闕後二相故成相違爲言問此有性量立離五句有別自性之時觀立敵共無同喩聲常量觀敵者無空論師雖無同喩約立者聲論既有同喩彼此既殊如何引爲喩答望立敵論頗雖是殊闕無同喩成相違義彼此是同故引爲喩耳言對無空論者設言也非謂論中爾説之次文云依此比量後三從初一因違四云云此文意何答意云若依論説無初一與餘合違之理今依此勝論所立比量而説後三從初一一因違四宗也爲言次文云法自相相違者所説有性離實等外無別自性許非無故如實徳等云云此是一因違四量先勘付法自相相違也問爾其勘付方何答所説有性者有法自相也離實等外有別自相者法自相也許非無故因同品非有異品實等上有同無異有闕後二相故作能違云所説有性離實等無別自性許非無故如實徳等也本量同喩云同異性今改云實徳等也次文云同異入宗所等之中故無不定云云此文意何答作能違量之時以同異性即入宗云離實等外無別自性之等言中故無不定失若不入宗中之時離實等有別自性故成異品有不定失即作不定云爲如實等所説有性離實等無別自性爲如同異性所説有性離實等有別自性而以同異性既入宗中故無不定也問其入宗所等之中者如何答作能違之時具可云所説有性離實徳業同異和合無別自性爲言問若爾以同異性亦可爲同喩耶答爾也問若爾何明燈抄云此法自相相違因中唯實徳等得爲同喩其同異性不得爲喩不隨所立故後三相違其同異性亦得爲喩隨所立故由此當知因必須本喩或改同云云答此抄意云離實等無別自性者其離實等者只云離實徳業言也其同異性離實等三故不隨所立宗故不爲同喩爲言然既云同異入宗以其入宗法皆爲同喩故此抄意不順疏文且似不可依之問若以同異性爲同喩者何云今將後三以就初一以異爲同便有合者改他能立之同喩故云云答理實同異性是本量異喩本無同喩今能違量以彼本量異喩同異性爲同喩故自然成改他能立之同喩也問若爾何故能違量同喩更云實徳等似改喩耶答凡此能違量同喩只非同異性實等五句皆成同喩爲顯此義改詞云實徳等也其等下等同異性亦以同異性爲首可等餘實等故下云此上同喩擧同異爲首亦得等云云次文云彼所立量離實等有性是法自相能有實徳業離實等有性不能有實徳業離實等有性是法差別彼意本成能有實徳業離實等有性故今與彼法差別爲相違云所説有性應非能有實徳業離實等有性許非無故如實徳等云云此勘付法差別相違也問爾勘付方何答所説有性者有法自相也離實等外別有自性者法自相也此法自相下爲能有實徳業離實等有性不能有實徳業離實等有性者意許差別也立者意許爲立能有實徳業離實等有性之宗而同喩同異性能有實徳業離實等有性同異性非能有實徳業離實等有性大有望意許宗即成異喩許非無故因轉彼同無異有闕後二相故作能違云所説有性應非能有實徳業離實等有性許非無故如實徳等也問爾其能有實徳業離實等有性不能有實徳業離實等有性其體何物答能有實徳業離實等有性者離實大有也不能有實徳業離實等有性者古徳云云不同也或云即實有性也或云即義相違也今案可云和合句也意云和合句不能有實徳業然離實徳業有其體故也問離實等之等言亦等同異和合故和合句是所離内也而何爲意許片方答理實爾也但勝論師之意樂只以實徳業三爲離同異和合爲所離之外故立量之時以同異性爲同喩是即彼師方便矯立也然弟子勘失之時顯師主矯立勘成離實等之言亦可等同異和合乍五句以爲異品之時即成相違失今任師主矯立之意樂以和合句爲所離實徳業三外之物爲意許片方也爲言此義深奧也問凡差別相違者言顯共許意許所諍也如必爲他用立敵共許眞他假他爲意許所諍而此量法自相離實等外有別自性者弟子不共許故言顯有法自相失也何有意許答彼共比量也此自比量也故不可例也問設雖自比量對弟子立時若言顯無失可有意許差別而既以言顯成立師主樂爲之宗了弟子返難之何更亦有意許差別答約相違單與重殊故義不同更可思之次文云爲有法自相相違云所説有性應非有性許非無故如實徳等云云此勘付有法自相相違也問勘付方何答所説有性者有法自相即離實大有也離實等外有別自性者法自相也而同喩同異性是非離實大有故成宗異品許非無故因轉彼同無異有闕後二相故作能違云如文可知之次文云彼説離實等有性今隨難言陳而非有性故違自相不違自教自語之宗同喩亦無所立不成云云此文意何答此明此有法自相能違量無失之所以也意云既立自比量云所説有性明知離實大有今隨彼難言陳離實大有非有性故不犯自教相違自語相違又若弟子難實等不無有非有性如實徳等喩不成所立宗故喩可有所立不成然而難離實大有故喩無所立不成失爲言有明燈抄文頗似不本意故不記之次文云有性既爲有法自相作有性有縁性作非有性有縁性是有法差別彼意本成作有性有縁性故今與彼有法差別爲相違云所説有性非作有性有縁性許非無故如實徳等云云此勘付有法差別相違也問勘付方何答准先之有法差別可知之問其作有性有縁性作非有性有縁性者體何物耶答以上有法差別之所釋可知其義也次文云不改本因即爲違量故成四因云云此結一因違四之義也次文云此上同喩擧同異爲首亦得隨所立故云云此文意何答此上四違能違量同喩亦以同異性爲首可爲同喩隨所立宗故云云問若爾乍四皆以同異性亦可爲同喩歟答爾也問若爾何明燈抄云具文而言此上同喩除法自相餘三相違擧同異爲首亦得隨所立故言隨所立者除法自相説餘三違爲簡初一遂致此言云云答如先所釋此抄意云同異性離實等三有別自性故作離實等外無別自性之能違時同異性不隨所立故不成同喩故云除法自相也然而説其法自相能違既云同異入宗所等之中故具可云所説有性離實徳業和合同異外無別自性如此立時即以實徳業和合同異皆爲同喩皆隨所立而何云約法自相除同異性爲喩不隨所立故耶故此抄文且不可信之言離實等者只案唯是離實徳業三云和合同異也故不信也重意云所違量云離實等外有別自性者等言只等徳業不等和合同異是師主矯立也能違量云離實外無別自性者等言等徳業和合同異是弟子勘顯師主之實意難也故所違能違等言有此委曲而此抄偏就所違量意忽忘能違量意也次文云違一有四論自説二違二有六論自説一違三有四今略叙一違四有一今亦示法自餘十種皆如理思云云此明能乖返因有十五類中既説其五類也小論説三違一有二謂法自相法差別也違二有一謂有一實故等因違有法自相有法差別也此疏説二謂一因違三量一因違四量也自餘十類如理可思之清𭅪注抄出之次文云此四亦有他自共比各三亦説有違他自共四相違因合三十六云云此文意云凡此四種相違有自他共三種自比量中亦有他自共三種他比量中共比量中亦復如此自比量中亦有自他共三種四相違即三四十二也他比量亦如此有三四十二共比量亦如此有三四十二都合有三十六相違也次文云論文所説皆共比違共向三四因皆自比違自他比違他等皆應准知云云此文上言自他共中小論所説四相違因共比量違共也所先説一因違三一因違四因皆自比量違自也亦可有他比量違他皆可准知非此所明故略之次文云諸自共比違共及自皆爲過失違他非過他比違他及共爲失違自非過義如前説云云此文意云諸自比量違共與自爲失違他非失諸共比量亦復如此諸他比量違他與共爲失違自非失其義具如疏中卷説自他共不定等之處也問先云何云自比量自等耶答若宗因喩倶以自許法立量云自中自比量若以自許法爲宗以共許法爲因喩云自中共比量若以自許法爲宗以他許法爲因喩云自中他比量也共中三種他中三種皆准知之次文云此但説全應詳一分云云此文意云所上言自他共等説全分量現理亦可有一分自他共量爲言次文云既許一因通違四種故知此四非必相違云云此文結通雋法師後義勢不同難了也問此文意何答意云如論文非可有初法自相與餘三合一因違二三四等之理然而見此一因違四量既一因通違四宗故知此四種非一向各別違爲言非必相違者非必各別言也非四相違之相違也已上通雋公二難了文云問四於九句何句所攝云云此問意何答此問此論所説四種相違所違量九句因中何句所攝也自問答也次文云答乍觀文勢唯初一違是九句中第四第六具二因故九中二因違法自相相違因故今觀後三皆彼第四同品非有異品有故違所立故云云此答也此答意云約法自相相違有二種所作性故因同喩虚空非有異喩瓶等有故第四句攝勤勇發因同喩虚空非有異喩電上非有瓶上有故同品非有異品有非有第六句攝後三相違積聚性故因有一實故等因皆同品非有異品有故第四句攝爲言問若後三相違因皆第四句攝者何纂文云有一實故等因即九句中第六句也云云答纂意委曲尋也意云有性量勘失之時同喩同異性勘成異喩其和合句亦可成異喩而有一實故等因轉同異性不轉和合句故異品有非有第六句攝也今疏意本量只以同異性爲同喩不用和合句故勘失以同異性成異喩之時因轉彼同品非有異品有第四句攝言也約和合句本不爲喩故不勞勘成同品異品也先徳云疏文述古師義也今謂似甚惱之問就纂意何故和合上有一實等因不轉耶答和合句不有實等故有一實等因不轉也次文云此上所説但是立敵兩倶不成四相違因亦有隨一猶豫所依餘三不成四相違因云云此文意何答凡三支過中皆有四不成故此文明此四相違因亦有四不成也問若爾此論所説四相違云兩倶不成四相違因意何答謂之諸記不同也且周記云問不成是初相過相違後二相過各自不同云何得不成就相違而作句耶答不望體説但望名説立者本立因擬正成宗因既闕相不能成宗此相違因名不成因云云明燈抄同之抄有又義不可用之邑記云四相違因不闕初相此言兩倶不成等者非是此因不依有法名爲不成但是兩倶不許於同品有名兩倶過餘三不成亦準於此以相違等竝是後二相過故云云獻記云此望同喩立敵不成也然疏下文説若有兩倶不成必無不定等者彼望宗有法不成也云云同邑也問此等記中可依何答先徳不判之今謂可依邑獻二記也問何以知爾答疏中卷説四種不成了云然上但説因於宗不成理實此因於同異喩隨應亦有四種不成故理門論解不成已云於其同品有非有等亦隨所應當如是説至下當知然名不定及名相違不名不成云云明知今言兩倶不成者在喩兩倶不成故云立敵兩倶不成四相違因也重意云此四相違勘失時立敵倶不許因同品有異品非有故成相違即云立敵兩倶不成四相違也爲言問爾其餘隨一等不成四相違何答疏中不出然明燈抄云如説聲常勤勇發故若以顯論隨一相違彼許顯發順常因故是隨一不成相違也若疑烟霧立彼有火以現烟故猶預相違是猶預不成相違也兔角是無鳥依生故即爲所依不成相違是所依不成相違也如初相違具四不成餘三相違理應必有云云此等皆在喩不成也問約此等具作法方何答聲顯論師對佛弟子立聲常勤勇發故如聲性此聲性同喩立者成敵者不成故因觀敵者同無異有闕後二相故作能違云聲無常勤勇發故如瓶等是喩隨一不成法自相相違因也又疑若烟若霧立彼處應有火以現烟故之時此以現烟故因不定轉同喩廚舍等上依之約喩立敵倶未生決定喩解故返作能違云喩猶預不成之相違因也又立兔角是無鳥依生故如龜毛等之時自體依同喩助所依因倶無故有喩所依不成返作能違故云所依不成之相違因也然此後二能違可尋作之次文云三十六中一一有四合計一百四十四種諸相違因如不定中引理門説皆應思准恐文繁雜故略不述云云此文意云上云有自他共相違各亦有自他共故有三十六相違此三十六中一一皆有兩倶隨一猶預所依之四不成有四番之三十六故都合有一百四十四種相違因如疏中卷説不定中引理門論説之皆可思准繁故略之爲言次文云然理門論攝此頌云邪證法有法自性或差別此成相違因若無所違害云云此出理門論攝説四相違因之文也明燈抄云此之一頌攝四相違文有三節初之二句顯四相違言邪證者釋相違義能倒立故名爲邪證法謂宗法如無常等軌生物解故名爲法言有法者宗有法也如色聲等能有宗法故名有法如是二種各有自性及差別次有一句結成相違謂此四因由倒證故名相違因後有一句釋成所由夫與他因作相違過所立比量必須違害他所許宗而不違害共所許現量等義方成相違故云若無所違害云云邑記云上之兩句意明本所立量要以異品爲同品邪證自性差別四種宗法下之兩句明敵者成相違過必須同有異無無所違害方成能破云云文云問如前所説十四似因設有兩倶不成亦有不定及相違耶如是乃至設相違決定亦相違因耶云云此問凡因有十四失謂四不成六不定四相違也此十四一一相對問明竝不並之由也是乘言勢來問也如是乃至者此中可有多相對存略故云爾也次文云答若有兩倶不成必無不定及與相違兩倶不成彼此倶説因於宗無不定之因於宗定有彼因立正用此因違彼正必違此違必正令宗不定相違之因亦於宗有隨其所應即用此因成彼違義此違無正彼正無違令宗決定故名相違由此若有兩倶不成必無不定及與相違云云此答文也有殘如下問此答意何答若有兩倶不成量必無不定及相違兩倶不成闕初相失不定闕第三相失相違闕後二相失故此三失無相竝之理爲言邑記云問且若言兩倶不成必無不定者如前論解不定中同品一分轉異品遍轉云如説聲非勤勇無間所發無常性故此乃聲生對聲顯立兩倶不許無常性因於有法有疏自斷爲兩倶全分兩倶不成今何不許兩倶不成亦有不定耶又若兩倶不成必無相違者如立聲常眼所見故此因立敵不許於聲上有又於同品虚空上無異品瓶盆上有豈非兩倶不成亦是法自相相違過耶又前解因三相闕二有三闕三有一如闕初二或闕初三理應合有兩倶不成及不定過既許闕三即應許有兩倶及相違過如何此中不許兩倶不成亦有不定相違過耶答今此疏意且約三相中唯闕初相名爲不成後二相中偏闕一相名爲不定二相倶闕名曰相違非盡理説不是前後自相違害據其實理得有兩倶不成兼餘過也云云明燈抄云太賢云雖無全過今約一分兩倶不成亦有一分不定相違如立一切聲皆是常勤勇發故如聲性等共許此因於外聲無若於内聲便有二過若許同喩以瓶不定若無同喩是相違故若准此解疏主亦同今約全分而作此説云云問古徳疑云若兩倶不成必無相違者何上云此上所説但是立敵兩倶不成四相違因耶如何可通答上下殊也上約喩兩倶不成云相竝也下約因不遍宗兩倶不成云不相竝也問其彼因立正用此因違之意何答明燈抄云此顯不定過體也如立聲常所量性故同喩如空等異喩如瓶等彼所量性因於立論人雖是正因於敵論人必用此因可違彼宗於異有故即作不定違故云用此因違也云云餘記意同也問次云彼正必違此違必正之文意何答明燈抄云此明不定義其前量因望彼立者即是正因異品有故必違彼宗故云彼正必違又所量因望此敵者即是違因必正成宗互正互違令宗不定即亦不定義云云清記云彼正必違者彼立者因雖得名正亦必有違異品轉故此違必正者此據破量既違彼宗必正破也云云餘記大意皆同也問次下云此違無正彼正無違之文意何答是釋相違因義也明燈抄云此違無正者此立論者唯是所違無有正因彼正無違者彼敵論者唯是正因無所違害此理常定令宗決定故名相違云云餘記意亦同之次文云若有後三不成可有不定及與相違隨應還成隨一等不定及相違義由因於宗隨一猶預隨一所依而説有故然非一切就三隨一可説有故云云此文上答文殘也意云若有隨一不成及隨一猶預不成隨一所依不成之量亦有隨一不定及隨一相違爲言明燈抄云後三不成通不定及相違隨應還成隨一不定隨一相違等然非一切不定相違皆有後三不成也後三不成得有不定及相違者各據隨一可得有故若不定中有隨一隨一不定隨一猶預不定隨一所依不定若相違中有隨一隨一相違隨一猶預相違隨一所依相違乃至答兩倶之中無隨一義故無不定及與相違後三不成各有隨一故有不定及與相違既言隨一一分闕初相一分不闕初相若約闕義即有不成約不闕義同有異有即有不定約不闕義同無異有即有相違云云餘記略之次文云自他共比既各有三有體無體全分一分梗概以而説二十七不成五十四不定三十六相違合計一百一十七句似因相對寛狹以辨有無皆應思准恐繁且止云云此文明十四似因廣略之所以也有體者有因體也無體者無因體也全分一分者如文也明燈抄云兩倶四句一有體全分二無體全分三有體一分四無體一分也隨一八句一有體他隨一二有體自隨一三無體他隨一四無體自隨一五有體他一分隨一六有體自一分隨一七無體他一分隨一八無體自一分隨一也猶預六句一兩倶全分猶預二兩倶一分猶預三隨他一全分猶預四隨自一全分猶預五隨他一一分猶預六隨自一一分猶預也所依九句一有體全分二無體全分三有體一分已上兩倶所依不成四有體他隨一五有體自隨一六無體他隨一七無體自隨一八有體他一分隨一九有體自一分隨一也已上隨一所依不成也合二十七不成也五十四不定者六不定中各有九不定六九五十四不定也比量有三謂自他共此三各有自他共三不定三三九也三十六相違者此四相違有他自共此三亦各三謂他自共合有九種此九各有四種相違四九三十六也合一百一十七句似因計上可知云云言相對寛狹等者周記云有是不成亦不定亦相違名寛有是不成亦不定非相違次寛有是不成非不定及相違名狹不定及相違作法准此云云次文云依理門云因與似因多是宗法不定相違竝於宗有多竝宗法唯四不成於宗上無非宗法故有四不成定無相違及不定過此説共者餘如理思云云此文會違文也依理門論者二八正因及不定相違因皆有遍是宗法性之義故云多是宗法唯四不成因無遍是宗法性之義故非宗法若依此義者有四不成量定無不定相違是約共比量説也若約自比量等者然可有相竝義爲言問其此説共者餘如理思之意何答謂之諸記不同也頴記云此説共者者説立敵共不成即兩倶不成非共比也云云清記周記意皆同之明燈抄云四不成中有自他共今此約共説無相違及不定過若自一分容有此義於宗有法互容有故若有一分兩倶不成亦有一分不定相違如立一切聲皆是常勤勇發故如聲性等共許此因於外聲無故有一分兩倶不成若於内聲便有二過不定相違若許同喩以瓶不定若無同喩犯相違過由此義故云此説共者餘如理思云云問此等記意如何答頴記等意云共者兩倶不成云共爲言明燈抄意云共比量云共爲言問爾此中可依何答取捨任意彼倶聖言必可有其義也四種相違私記下卷天延三年乙亥七月五日於鹿苑院自記之或依記古徳之義或述自之鄙懷逐聖語則雖無依謬陳愚情則訛錯多端以恐以懼願歸勝義是則爲充溫覺上人法花會竪義料也興福寺釋眞興集寫本云永享三年三月之末從或律師方相傳之喜悦無極者也三論宗延營于時文明十五年卯十一月五日令書寫畢三論沙門英憲生二十一朱筆長享貳戊申九月下旬之比移點了于時秋雨叩窓黄菊亂風而已
