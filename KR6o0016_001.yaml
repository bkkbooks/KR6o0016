body:
  text: 四種相違略私記卷上釋真興集疏云論相違有四謂法自相相違至差別相違因等云云意何答凡約因明比量門有宗因喻若邪比量者此三支中有若干失謂宗有九過因有十四過喻有十過其因有十四失中相違失有四謂法自相相違法差別相違有法自相相違有法差別相違疏主牒之云相違有四等云云疏云述曰下第三解相違有三初標次列後釋此初二也云云意何答釋因十四過有三一釋不成過二釋不定失三釋相違失上已釋初二不成不定今釋第三相違此有三謂一總標相違名二別列相違名三別釋四種相違也為言疏云相違義者謂兩宗相返此之四過不改他因能令立者宗成相違與相違法而為因故名相違因因得果名名相違也云云意何答此凡釋得相違名之所以也即意云言相違者所違宗與能違宗相返之名然正能違宗得相違名即所違本量因令相違本所立宗更為與本量宗相違之能違量宗為因故云不改他因云云或本云而取他因等問若宗云相違者可名相違宗何名相違因耶答因得果名故名相違因不名相違宗意云宗是因所成之果因是能成此因令相違所成果之宗故因得果相違之名也問若不云因得果名名相違因云相違宗有何失答宗得相違名者依因力非宗獨相違何名相違宗耶意云聲常宗與聲無常宗雖相返然能相違所相違難定判今所作性故因不成本量常宗為與常宗相違無常宗為因能成相違之無常宗其無常宗被成立者依所作性因之力故因得相違名不名相違宗云也問疏云非因違宗名為相違故無宗亦違因例而成難云云意何答明燈抄云此嫌文軌師第一解也云云問意何答文軌師釋相違因有二釋即第一釋云問宗亦乖因豈唯因過過不在宗何得名相答如言父子相生子不生父亦得名相此即宗因兩形為相因返宗故名違云云此為顯相違即因持業釋之義作此問答也又就此釋次文云問常義既返所作何不宗説相違答宗言常住過失未生因言所作方乖所立故因説違宗無此過云云此為避此初釋所有例難所作問答也今慈恩御意總為嫌此第一釋之兩重問答云非因違宗等也問先此軌師兩問答意何答初問意且付聲常比量以所作性故因違常宗名因過者亦常宗已乖所作因豈非宗過乎若言宗無失者何得名相言也其答意云譬如言父子相生之時雖父與子相對名相然父能生子子不生父如此宗因相違之時宗與因相對名相然因能違宗宗不違因故不可例難言也重意云問即難不可唯言因失亦可言宗失也答即避此難也次問意云宗常義已返因所作義何只名相違因不名相違宗言也其答意云且付一具比量宗云聲常之時過未生因言所作性故之時宗常義違所作故初其失顯故因言相違宗不云爾云也重意云問即難何唯名相違因亦可名相違宗也答即避此難也問就此義文軌師已作二釋悉避例難何故慈恩嫌此義給耶答此例難專不被避所以者何宗言常住之時雖過失未生因言所作宗因相形之時因違宗故過失即生例知宗亦違因過失可生故用相違即因義之時猶有此例難故嫌也問軌師第二釋如何答其文云又釋如立常為宗無常返常名為相違立因為欲成常住宗其因乃成無常宗義與相違為因故名相違因也云云問何故慈恩不嫌此釋答與自義同故不嫌即相違之因依主釋之義也問若爾慈恩不立相違即因義耶答古德有二傳即一云亦立二云不立也後傳正也問若爾邑法師立即因義故彼記文云疏釋云與相違法而為因故名相違因者義猶未具所以然者立因之法同有異無今此四因同無異有故名相違故理門云於同有及二在異無是因翻此名相違此論亦云此因唯於異品中有是故相違故知兼此義方具矣云云又沼法師略纂云名相違者此亦兩解一云宗因兩形為相因返宗故名違相違即因名相違因二云常與無常等兩相返故名為相違與相違法為因相違之因名相違因云云答今案且邑記意不顧本疏同古師義不可必信略纂之意又一部文相似同古師計之住彼溜州未從慈恩以前所製歟若不爾者已作纂要纂本疏所遺之義作義斷破他師義何更自作別疏釋耶智周師先後二記皆用依主釋玄應作二釋以依主釋為正太賢師亦爾日本古德明燈抄及平備師等記皆用依主釋義也古德云慈恩亦用即因義云云至次下當論云云問次文云理門論云若法能成相違所立是相違過即名似因如無違法相違亦爾所成法無定無有故由彼説故因仍舊定喻可改依故下四過初一改喻後三依舊云云意何答此文中有二意即一以理門論為證成相違之因義二正以其論為證顯四種相違因必用舊喻通改不改之義也意云已言若法能成相違所立是相違過云云明知因法不成本宗成與本宗相違之宗名相違因故云以此文為證成相違之因之義云也又已言如無違法相違亦爾明以本量因為相違量之因云事故以此文為證成因用本喻通改不改之義云也云如無違法者本量宗未被過之時云如無違法易知之問次文云問有因返宗不順因義因名相違宗亦返因不順宗義應名相違云云此問起意何答云之諸師記不同且邑法師之以為此問意顯相違即因之義也智周師之以為此問意重顯相違之因之義也善珠僧正云此問起者依軌師疏問答而起也云云問此諸師意何答先邑法師意釋此問之答文云由因成宗等者此中前不齊解後齊解前疏不許因違宗故名相違因由有相例之失故不取之今既釋通兼取無妨云云此文意云疏釋相違因上下意殊上文云非因違宗等不用相違即因義此解不齊古師義故前云不齊解也下此問答中所釋者此相違即因義也此解即齊古師義故後云齊解也故知此師云為顯相違即因義發此問也為言云此齊不齊解古德云此兩重答中初答不齊解後答齊解云云又云云不同皆不可也智周師意即彼記問答云問前已解云與相違法為因而無宗因相例過已不取因返於宗名相違訖何故今後取此為難答前雖略舉而未顯陳所以今時而更誥問彰其比量亦有四過問與前同答與前別也云云此法師意今疏問答就相違即因之義發此問詰其答中具顯相違之因義言也善珠僧正意此問答非疏主自義且順古師假敘此問答也為言今案見智周善珠之意此問且順文軌師義以相違即因義假敘問詰以其答彌顯相違之因之義也慈恩御意為顯自義先以他師義發問內明因明之中處處非一也近則下文若難離實等云問其類耳邑記不可依之然或古德云此問亦以相違之因義問也即可讀文訓謂以有因令返宗云不順因義因名相違者以有宗亦因令返云不順宗義應名相違云云此傳無殊難也次文云答由因成宗令宗相返因名相違非宗成因令因相返不名相違云云此文意何答答前問有二答即一不順答二順答今此文初不順答也即立因為能成令宗相返因名相違宗非能成令因相返故不名相違言也見此答文顯相違之因義尤明也次文又因名法自相相違宗名比量相違云云此文意何答此答前問有二答之中第二順答也即立所作性故因違聲常宗云法自相相違瓶等是常宗違所作性故因云比量相違問所作性故因違聲常宗名法自相相違者是即因違宗豈非相違即因義耶答不爾所作性故因不成聲常宗云因違宗也然以此義不名相違因以不成常宗為與常宗相違無常宗為因名相違因為常宗遂是非因何名相違即因耶問比量相違不待因喻之失而何云宗違因名比量相違耶答其舉宗有失故可違因之道理自然顯耳故云宗違因之失故疏上卷云彼但舉宗以違因訖云云又可云約比量相違有二種即一瓶等是常之比量相違二聲常之比量相違也初是不待因喻之失也後非必爾今疏約立聲為常比量相違云宗違因名比量相違也纂有二釋一者立聲為常名比量相違二者亦不名比量相違云云後義意若對聲顯論師之時不許所作故非比量相違云也次文云因別疏牒相違開四宗違合説唯名比量相違以宗準因故知亦有法之差別有法自相有法差別比量相違不爾何故但説有法自相比量相違其相違決定及相違因各四種耶云云此文意何答此文前答文之殘也為通伏難更述此言故周記云此第二答中答宗亦名違因兼答伏難伏難云宗違於因不開有四因違於宗即開四耶答如疏可解云云意云或難云若云宗違因名比量相違因違宗名法自相相違者何故宗違因只名一比量相違因違宗乃有四種相違耶為言答文如疏易知之問何故比量相違合説相違因別説答比量相違舉宗失即顯影略故合説相違因以因顯有法與法自相差別之失故別別説若具説者約比量相違可有四種今為影現故合説問其不爾何故等之文意何答意云若不云比量相違影略故合説者更有何所以約比量相違唯説法自相之比量相違不説後三相違之比量相違約相違決定及相違因具説四種耶言也問爾者若具説者可有四種比量相違之方何答論唯説法自相比量相違不説餘三疏亦不説也問若爾指何可云後三比量相違答指後三相違可云後三比量相違故俊清記云以宗準因宗亦有四應云法自相比量相違餘三皆準之并須如比量相違之言云云問後三相違何可有比量相違答約後三相違各顯意許付過時唯有宗違因之失故亦云比量相違也問然比量相違不待因喻之失而何以因付過可名比量相違答此義不爾得比量相違之名違正比量之道理故也是即前宗違後量因故名比量相違也言不待因喻者是一相之説故纂云謂立於宗違正量因由自共因正故立量正違此量名比量相違云云斷云為正比量違故名比量相違云云問若相違因亦云名比量相違者因明道理可壞答專不壞相違因雖亦帶比量相違比量相違過相不殊故總合説一相違因過相殊故各別顯説宗所有失宗中合説因所有過因中別説為顯宗因各有失兩處説也問相違決定有四種者何答論唯説法自相相違決定不説後三然疏中卷以一因違三比量為後三相違決定也問爾一因違三量有相違決定方何答先本作法勝論師立自比量云所説有性非四大種許除四大體非無故如色聲等云云此量為成離實有性所立也而此量有法差別有法自相有法差別三過故作能違之時若用本因則只後三相違若改因則為相違決定故疏中卷云若不改前因違宗四種是後相違過若改前因違宗四種皆相違決定云云問其相違決定能違改本因方何答先法自相相違決定所違即是聲無常所作性故如瓶等之量也能違聲顯論師所立聲常所聞性故如聲性之量也此因喻俱改矣後三相違決定所違因是許除四大體非無故也能違之因捨許除四大之言只云體非無故是改因也問是省略前因何云改答隨具闕義亦殊加許除四大之言時遮不定失故本量必加用約能違量雖唯云體非無故無不定失故隨闕具義亦殊也故明燈抄云既置許除四大言與唯體非無故是異也云云此量所違能違具至下可知問相違因比量相違先邪後正相違決定前後俱邪何相違因亦有相違決定失邪答其單量重量異若單相違決定前後俱邪是疑因也若相違因所有相違決定前邪後正非疑因也已上相違因亦有比量相違及相違決定者是古德之傳耳今案竊觀疏文三種各別相違因無相違決定及比量相違比量相違無相違因失及相違決定失相違決定無相違因失及比量相違失故疏説比量相違云此中但明宗法自相比量相違準因亦有法之差別有法自相有法差別比量相違因違宗喻既有四失宗違因喻理亦有四恐文繁憒略之至相違決定廣當顯示云云此文意云今論所説瓶等是常之比量相違但説法自相所有比量相違今準相違因相違因既顯法自相法差別有法自相有法差別各所諍之失有四種因準知約比量相違不可唯有法自相比量相違亦可有法差別有法自相有法差別之比量相違云事恐繁不説之為言不謂云爾故四種相違因之宗亦有比量相違之又疏説相違決定云今論但説言之所陳違宗能別本所諍因名相違決定其有法自相雖言所陳非宗相返本所諍法二種差別意之所許雖意所諍非言所陳此三決定相違之因皆略不説以此準前比量相違亦有四種論中亦但説法自相比量云云此文意云論所説相違決定唯説兩所諍法自相常無常名相違決定其有法自相雖言陳非所諍法有法差別法差別言陳無諍故此三種略不説也先比量相違雖唯説法自相既云可有四種準知約此相違決定唯説法自相亦可有四種言也爾云故四種相違因亦有相違決定失云云問若爾何以一因違三比量為後三相違決定之作法答約一因違三比量之能違有二種一用本因二改本因若用本因作能違時為一因違三量之作法若改本因作能違時為後三相違決定之作法故疏云問相違決定違法自相亦有法差別有法自相有法差別耶答有若不改前因違宗四種是後相違過若改前因違宗四種皆相違決定云云既約能違量不改因者是相違因失改因者是相違決定也明知二過不並云事問約一因違三量改不改因之方何答疏云如勝論立自比量云所説有性非四大種許除四大體非無故如色聲等乃至他便作有法自相相違難云汝有性非有性非四大種故如色聲等是名有法自相相違決定乃至作有法差別相違云汝之有性應不能作有有緣性許非四大故如色聲等乃至作法差別相違決定云汝言有性非能有四大非四大種許非無故如色聲等云云不改本因之作法至下可知已上今案殊可祕之問次文云此宗説法略有二種一自性二差別云云心何答明燈抄云此因明宗説一切法略有二種一自性二差別如瑜伽説所成立義有二種一者自性二者差別今此因明中有法即是所立自性能別即是所立差別云云問次文云此有三重一者局通云云心何答此因明宗自性差別有三種謂一局通相對謂諸法之體局自非他名為自性法上義通自及他名為差別云也問次文對法等言所成立自性者謂我自性法自性若有若無所成立故各別性故差別者謂我差別法差別若一切遍若非一切遍若常若無常若有色若無色如是等無量差別隨其所應空等遍有色等非遍前局後通故二差別云云心何答此文正為證此初重引對法等文也等者等取瑜伽顯揚佛地論也問先何故以對法等所説明此因明宗自性差別答對法十六説論軌決擇有七種謂論體論處論依論莊嚴論負論出離論多所作法也即瑜伽因明處也説第三論依云論依者謂依此立論略有二種一所成立二能成立所成立有二一自性二差別能成立有八種一立宗二立因三立喻四立合五結六現量七比量八聖教量云云此既説因明宗故引對法等瑜伽十五因明處中論依云所成立義有二種者一自性二差別所成立自性者謂有立為有無立為無所成立差別者謂有上立為有上無上立為無上常立為常無常立為無常如此有色無色有見無見有對無對有漏無漏有為無為如此等無量差別門能成立法有八種者一立宗二辨因三引喻四同類五異類六七八如對法故等取瑜伽也問就疏文其我自性法自性等云意何答約我有二種一世間我有情命者等二聖教我預流一來等約法有二種一世間法實德業等也二聖教法蘊處界等也今言若有若無者此有二義一外道執世間我法自性為有撥聖教我法自性為無佛法者觀聖教我法自性為有毀世間我法自性為無二外道之中或執我後身為有常見也或執我後身為無斷見也是執我自性為若有若無也又五見之中四見為有邪見為無是執法自性為若有若無也佛法者中我名為有我體為無是觀我自性為若有若無也又遍計所執為無依圓二性為有是觀法自性為若有若無也言所成立故者釋成立義也言各別性故者釋自性二字也言若一切遍等者明燈抄有二釋一云一切遍者即是迦毗羅等執我量同虛空體周遍故非一切遍者即離繫子及獸主遍出等計即執我量有分分齊隨身舒卷及少如極微等此之二種是我差別言若常無常等者明法差別有常無常有色無色等二云又釋此中略明三對差別遍不遍常無常色無色以等餘門並通我法二種自性所有差別故法中亦有真如法空無我等遍諸法餘法不遍其我中亦有常無常色無色等云云問今此二釋心何答初釋意云遍非遍者我差別言常無常色無色者法差別言也後釋意遍非遍常無常色無色皆通我法二種差別言也此後釋重意云且外道中或計我體周遍或計少如極微是云遍不遍又或計我體常住或計能化梵王是常所化我等無常一分常論計是云常無常之差別又或計色蘊為我或計四蘊為我是云色非色之差別約法者邪見邊見為六十二見自體戒取見取為其眷屬薩迦耶見為其根本故此五見通六十二見故云一切遍六十二各各見不通餘見故云非一切遍即六十二中通斷常二見常見云若常斷見云無常即六十二法在有色界起云有色在無色界起云非色也又可云六句義法及二十五諦法中各有遍不遍常無常色非色等之差別可尋若約佛法者施設我義通涅槃大我義故云遍施設我義不通實我義故云不遍施設我無常故云無常涅槃大我常故云常欲色二界預流不還等有色身故云色無色界聖者無色身故云非色約法差別者空無我通一切法故云遍有漏無漏不相通故云不遍欲色二界繫法云有色無色界繫法云非色也此述意述愚懷後人不可必見問且約我法體云有無云遍不遍等專無差別而何云有無名自性云遍不遍等名差別答甚殊云有無者謂有體無體之言也即是自體實有自體實無也此實有我法之上有遍不遍等無量差別約實無之我法上亦爾故明燈抄云即是有體之我法及無體之我法等所有遍不遍等為差別義云云又有一釋今略之言空等遍有色等非遍者明燈抄云執我量與虛空等者我體遍有執我有分齊隨身舒卷及少如極微者我與色等不周遍故云空等遍有色等非遍云云如此文者只釋外道所計差別義不釋彼所計法差別及佛法我法差別之義既有隨其所應之言理須具釋今略之今此抄意空等色等之等言是均等之等非等取餘言也周記云空等遍有者苦空無常等遍通一切色等非遍者此色等法不通是他上故名非遍云云問此兩記意異可據何答取捨任心云云問次文二者先後於總舉中言先陳者名為自性言後説者為差別以後所陳分別前故云云此文心何答此第二先陳後説對也此對意若自性之體若差別之義言顯先陳名為自性言顯後説名為差別言也問何故若體若義先陳為自性若體若義後説為差別答云差別者分別異名也謂約立量若體若義言陳先舉有法名自性若體若義言陳後舉能別名差別以後説能別之法分別前有法之法故言也問此重與前重有何差別答前對聲體局己不通云自性無常義貫通因喻云差別也此對不爾若聲體若無常義先陳有法為自性若聲體若無常義後説能別為差別以此能別分別彼有法故前對差別流下此對差別向上故專異云也問次文佛地論云彼因明論自相共相與此有異彼説諸法各付自體名為自相貫通他上如縷貫花名為共相云云意何答此為證此重引佛地論文也問此文心何答此文佛地論師會佛地經所説自相共相違於因明論所有自相共相之文即意云佛地經意色心自體名為自相彼上所有無常等義名為共相今因明論意各付己體為自相貫通義為共相謂若色心法體若其體上無常等義若只云色心若只云無常之時各付己體不通他上故云自相若或先舉色心後舉無常時先陳色心不通他故云自相後説無常分別先陳色心之時此無常義通先陳他顯得色心無常義故貫通他上名為共相又或先舉無常後舉色心之時其前陳無常只付己體未知何法無常故云自相以後説色心分別先陳無常之時此色心義通先陳他顯得無常色心義故貫通他上名為共相是以明知此論與彼經自相共相各異云也自相者自性也共相者差別也問今見所引佛地論文可為先局通對之證而何引證此對答至下可知具以顯示矣問佛地論正文如何答彼論第六卷説妙觀察智能緣自共相境有三有義第三云如實義者彼因明論立自共相與此少異彼説一切法上實義皆名自相以諸法上自相共相各付己體不共他故若分別心立一種類能詮所詮通在諸法如縷貫花名為共相此要散心分別假立是比量境一切定心離此分別皆名現量乃至是故彼論説諸法上所有實義皆名自相此經不爾故無相違云云問且因明論如何説具引云彼因明論等耶答且小論説真量所須之量云復次為自開悟當知唯有現比二量此中現量謂無分別若有正智於色等義離名種等所有分別現現別轉故名現量言比量者謂藉衆相而觀於義相有三種如前已説由彼為因於所比義有正智生了知有火或無常等是名比量云云得此論文意所引也問此文意何答此文意真能立量必有二具一現量二比量現量者自相比量者共相具此二量立量成立故理門論云由此能了自共相故非離此二別有所量為了知彼更立餘量故依二相唯立二量云云今小論疏述彼意云是故陳那依此二相唯立二量其二相體今略明之一切諸法各付己體即名自相不同經中所説自相以分別心假立一法寬通諸法如縷貫花此名共相與經中共相體別云云大論自共相可見之言如縷貫花者猶如一縷貫黃赤花一無常言貫通色心言也問次文故依於此聲等局體名為自性無常貫他名為差別得名不定云云心何答意依此先陳明後説因明論之自共相一具量中聲等先陳局己體為自性無常等後説通他為差別云云此且以聲無常指示也可謂又以諸法共相為先陳名自相以諸法自相為後説名共相故此因明宗得自共相名甚以不定所以者何自相名自相共相名共相自相亦名共相共相亦名自相故明燈抄云自相共相皆有自性自相共相皆有差別此義唯在因明之旨何者有法言自性法是差別云云約經自共相得名決定故也問次文若立五蘊一切無我蘊為自性我無我等名為差別若説我是思思為差別我為自性是故不定云云等漏無漏也意何答上且近取此論所説聲無常量顯自性差別得名不定而言聲體為自性無常義為差別者如常道理得名不定義未分明只説一相故今細為顯得名不定之所以更出餘二量也意設佛法者對外人立量云五蘊應無我之時五蘊法是法自性以此為先陳之時必本性為自性此五蘊上立敵所諍我無我義為後説之時亦如義為差別此例道理也而數論師立量云我是思之時以為五蘊上義之我為有法故名自性以五蘊中思心所為能別故名差別是量即以差別為自性以自性為差別也與先既殊故此因明宗得自性差別之名隨宜不定為言故明燈抄云立我是思我為自性是有法故思為差別以是法故即我共相亦有自性思之自相亦有差別自性差別各無所的得名不定云云問次文以理推之此雖即前然教少異義亦別故分為二門云云心何答此文意此前陳後説對即前局通對也謂即前局通對意色心我法自性局己為自性常無常等義通餘為差別又約立量門有法為自性法宗為差別言也此前陳後説對亦爾諸法局己為自性以通他為差別此即前義故云即前也但分為二門有二所以一即説自性差別教旨異故二即自性差別之寬狹不同故也問此二所以何答言教旨異故者説局通對者以對法瑜伽等説我法之體為自性常等之義為差別為證也今此對以佛地論所立因明論自共相體義不分別各付己體為自相貫通他上為共相之文為證彼此不同故云教少異言教異者非但教異言教旨異也因明論自共相有其二分一分同於對法等謂體為自性義為差別也一分異於對法等謂亦義為自性體為差別也故云少異也檢以諸法上自相共相各付己體等之文此義尤明也言寬狹不同者前對狹今此對寬言也謂前對唯約體義局通分別自性差別故云狹此對體局為自性義通為差別與前對同也然又義局為自性體通為差別從前之外義故云寬也故此對與前有同有異同故云即前異故云分二然云此對差別古德義如雲今皆略云云問次文云三者言許言中所陳前局及通俱名自性故法有法皆有自性自意所許別義所可成立名為差別故法有法皆有差別云云意何答此文説第三言陳意許對之文意諸法自性差別若陳言顯名自性故有法與法俱有自相諸法自性差別若意許立名差別故有法與法俱有差別言也問上有二對何故云前局及通舉第一對不取第二對答前局及通者總合前二對第二前陳後説對亦有局通義故云前局及通今此對意一切自性差別言陳名自相一切自性差別意許名差別故不可言取此捨彼也問若爾何周前記云以於局通對作法定故取前陳後説對作法不定故不取答此理不應故同後記云此第三對言陳之中隨其所應前二門若約義顯者但攝第二乃至不如總攝云云故知此記前後不同也問次文非取一切義如先説云云心何答言顯宗為自相意許宗為差別其差別者非一切義皆是差別唯兩別許若所諍別義違他順自方為差別非取宗上餘一切義也謂設有聲上執受大種生非執受大種生等之差別又無常上有轉變滅壞等差別非意所諍故不取之自餘皆準之疏上卷説之故言義如前説也問此上三對次第何故爾答第一重凡明因明門所成立之法第二重明立量門第三重正明四相違門故次第如此也然斷文總攝自性差別略有二門一依諸經論門二唯依因明論門云云此二門各有四對初門四對者一體義二總別對三詮非詮對四名句對云云後門四對者一體義對即總別對二總別對四相違是也三前陳後説對即辨宗依是通前對云云四言陳意許對即四相違因所違者是也恐繁悉略之問次文云今説有因令此四種宗之所立返成相違故名法自相相違因等云云心何答此文意就此第三言陳意許對正顯相違宗有四云事也謂宗中法與有法各有自性差別二種故宗有四所作性故等因令此四宗所立返成相違故名法自相等四相違因言也問次文論説等者義顯別因所乖返宗不過此四故論但説有四相違能乖返因有十五類云云心何答此釋論所説等言也別因者論所説三因之外餘十二因也問所乖返名宗能乖返名因者豈非相違即因義耶答明燈抄云所乖返宗者兩宗乖返名相違能令乖返説名因能相違量所相違量此二義互相望名能乖返宗名所乖返宗此所乖返宗能令乖返故名能乖返因非謂因宗互相望名能所故前後文不相違也云云問次文云違一有四謂各別違違二有六謂違初二法自相法差別違初三法自相有法自相違初四法自相有法差別違二三法差別有法自相違二四法差別有法差別違三四有法自相有法差別違三有四謂互除一一者除有法差別違餘三也二者除有法自相違餘三也三者除法差別相違違餘三也四者除法自相違餘三也違四有一一因違四之比量故成十五云云心何答此列能乖返十五因也竪有四類橫有十五可悉之問次文云論中但顯初二別違一因後二共違二因舉此三種等餘十二故説等言云云心何答此結意能乖返因有此十五類然而今論唯説所作性故因違法自相積聚性故因違法差別有一實故等因違有法自相差別二宗之三類因等取餘十二類因故説等言云也此能乖返十五因作法如清𭅪師注抄之可見已上初料簡問文此中法自相相違因者至無間所發性故述曰下別釋四初文有三初標牒名次顯宗因後成違義此初二也云云上標名列名已了下正明四種作法也如文可悉之問次文問相違有四何故初説法自相因答正所諍故上比量相違相違決定皆唯説彼法自相故從彼初説文問此問答意如何答問意易知答意凡一切比量舉宗時必以法自相為所諍之宗設欲成立法及有法自相差別立敵相對所諍者是能別法自相故論説前比量相違相違決定唯説法自相比量相違相違決定依此説相違因先説法自相也言從彼者非指前比量相違相違決定是指正所諍之言也此意也但周記指前比量及決定相違等從彼云云不可依問文云此有二師如聲生論立聲常宗所作性因聲顯論立勤勇無間所發性因文意何答此正出法自相相違作法也此有二師一聲生論師對勝論立量云聲應常所作性故同喻如虛空異喻如瓶等云云二聲顯對勝論立量云聲應常勤勇無間所發性故同喻如虛空異喻如電瓶等云云問次文論此因唯於異品中有是故相違述曰此相違義由初常宗空等為同品瓶等為異品所作性因同品非有異品遍有九句因中第四句也云云意何答是約初量闕後二相也意凡正比量者必具因三相一遍是宗法性二同品定有性三異品遍無性而今此量闕同品定有異品遍無二相是相違義也為言次文云應為相違量云聲是無常所作性故譬如瓶等云云意何答是出能違量也問先付初量爾此量令闕後二相作能違方何答聲者有法自相應常者法自相所作性故因不成聲常宗為與常宗相違之無常宗為因此因同喻虛空上非有異喻瓶上有同品非有異品有闕後二相故作能違云聲無常所作性故同喻如瓶等異喻如虛空云是其作法也是約初量作法也次文云由第二宗空為同品以電瓶等而為異品勤勇發因於同遍無於異品電無瓶等上有九句因中第六句也云云意何答此約第二量闕後二相也此因同品非有異品有非有故闕後二相作能違量準前可案之次文云此之二因返成無常違宗所陳法自相故名相違因云云是釋上二因名法自相相違因之所以也次文云故理門云於同有及二在異無是因返此名相違所餘皆不定文此為證此上二因名相違及攝四六句之所以引理門説九句之頌也即此頌中説正因相違因不定因以九句皆攝此三因上十字説正因次五字説相違因後五字説不定因若配九句二八為正因四六為相違一三五七九皆名為不定具如九句義也次文云此所作因翻九句中第二正因彼同品有異品非有此同品非有異品有故此勤勇因翻九句中第八正因彼同品有非有異品非有此同品非有異品有非有故上已數論略不繁述云云此文釋前二量所違翻二八句兼顯能違攝二八句也即能違所作性因攝第二句能違勤勇因攝第八句疏上釋九句中具釋故今略之為言問何故此法自相相違作法必有二種答此有五解一者立者異故二者內外異故聲顯立內聲聲生立內外聲三者顯四六故四者有寬狹故所作因寬因成寬宗勤勇因狹成狹宗故之五違二八故立之次文云此一似因因仍用舊喻改先立後之三因因喻皆舊由是四因因必仍舊喻任即同云云意何答意上引理門論云若法能成相違所立等之文釋相違義次兼標因必仍舊喻任改同之義了今正入此四相違門初一能違改喻後三能違不改還成前義故云由是四因因必仍舊喻任改同也次文云若不爾者必無法自相與餘隨一合可成違二因許初改喻後三不改故云云此文意何答明燈抄云此下簡過成軌也云云意為通伏難決定義故作二返難答此其初返難答也問其伏難何答其抄云有人文外伏難云今觀論文初之一因言仍用舊喻改先立後之三因因喻皆舊既初改喻後三不改喻法既決定文亦分明何故今云由是四因因必仍舊喻任改同耶云云問爾其返難答意何答文云返難意云若不言四因因必用本喻任改同者必應無有此法自相與餘宗合違二等因如文取義執初改喻後三不改其法定故問何故云初一改喻後三不改之時可無法自相與餘三合違答喻改與不改異何合違耶次文云又九因中第四第六名相違因要同非有異有或俱若隨所言後三相違直觀立者因於同有如何復難成相違耶理門但言若法能成相違所立是相違過即名似因不説同喻亦仍用舊此論示法初一改喻後三依舊欲令學者知因決定非喻過故下之三因觀立雖成返為相違一一窮究皆亦唯是同無異有成相違故至下當知云云抄云此第二返難答也問此第二返難意何答意若汝言四相違因初一改喻後三不改決定者九句中四六句名相違必因同品非有異品有若異品有非有也而後三相違觀立者意法差別積聚性因於同喻臥具有也有法自相有法差別有一實故等因於同喻同異性有也此後三因非同無異有如何復難成相違耶汝云後三不改喻故但理門論云如無違法相違亦爾只説因用本不説喻改不改此小論初一喻改後三不改者欲令學者知因失決定非喻失也所以者何若喻失者乍四必可不改喻而改喻不改喻皆成相違明知是因失非喻過也約後三因細尋時無宗同品本量同喻皆異喻故其因同無異有成相違也云也此第二返難中有三義一難若爾可無後三相違二會釋二論意三陳後三相違自然成喻改之所以也問此二返難答有何殊答初返難意云若不如我言可無一因違二等量後返難意云若如汝所言可無後三相違量云也然先德義如蟻皆不可依之問其伏難人誰答可指雋法師耳次文云問如聲論言汝聲無常應非是聲無常所作性故如瓶盆等第二正因豈非有法自相相違云云此問意何答此以聲生論師為法自相能違量又更作能違為問也問爾此能違心何答若汝以聲同瓶即同瓶無常者瓶是可燒可見聲不可燒見瓶與聲其義差別故難汝聲無常可非聲無常如瓶無常也次文云答彼非過收如立聲無常無常為法自相若所立因返成聲常可是此過今者雙牒有法及法為法有法故非此過此乃但是分別相似過類因犯兩俱不成所作性因立敵不許依無常故生滅異故設彼許依亦犯隨一又無常無能依所作性亦犯所依不成過故云云此答前問也問此答心何答此答彼外人能違非真能破之所以也即有二所以一者此能違量是可攝十四過類中分別相似過類二者此量因有二失故非真能破也問先可攝分別相似過類之方何答分別相似者瓶為同法於彼同法有可燒等差別義故是則瓶應無常非聲聲應是常不可燒等有差別故此分別顛倒所立是故説名分別相似云云理門論文此於同法喻中分別可燒不可燒可見不可見等與宗義異名分明相似云云西明疏文也燈抄同也今此難爾即於宗中分別法與有法差別之義是故分別相似過類攝也云云燈抄文也此文意頗隱也分別法與有法者非謂只依分別法與有法名分別相似前喻中分別以瓶與聲義各異還分別宗中法有法故名分別相似云云問設分別相似過類者何故非真能破答以聲瓶俱所作性俱無常為同品也而以非所須不本意之義顛倒分別付過故非真能破也問因有二失者何答一兩俱不成若隨一不成二所依不成也意云有法所舉無常者是滅義因所作者是生義立敵共不許生義依滅義故有兩俱俱不成失也設立者雖許生義依滅義敵者佛弟子不許此義故因有他隨一不成失也若言有兩俱不成可即無隨一不成若有隨一即無兩俱故言一失又有法所舉無常者是無義法所作性因是有義法所依既無故因犯所依不成故有二失也此二失者皆一分失也可悉之問何故無常云滅義云無義法所作云生義云有義法答諸法依滅得無常名故云滅義滅即無體故云無義法也諸法所作生故所作云生義生即有體故云有義法也問爾聲無常量所作性因可不成無常宗答此義不爾第二正因為顯有為無常之道理所立也以表諸有所作之生義必有無常之滅義因能成宗也今有法為所依因為能依所依滅無能依依何故所望義殊不可假難之次文云設有難言汝聲無常應非是聲無常許無常故如瓶無常云云意何答此為第二正因有人作能違也周記云此敵論者作前法自相相違過既不成已更轉救言我為先量不改本因不成法自相相違過今改本因豈非彼過耶云云問且念本量有何失作此難答依周記者猶為付法自相失難也問此答中云不可為法差別亦非相違決定而何云法自相失答其重遮也意云非唯不可為法自相失亦不可為法差別及相違決定云云次文此亦非過諸無似立此過相故聲有無常是根本諍聲是有法非是法上意所許義不可説為法差別過亦非相違決定所收非根本諍故云云此答前難也問此答意何答此所作能違量亦專非過所以者何諸似立中無此過相法自相相違必不改本因而因既改何云法自相過耶設彼轉救云我改因者欲作法差別相違若相違決定者此亦不可本所諍者聲上無常聲者是有法非是聲上意許義故不可為法差別過又若改因故欲作相違決定者亦不爾本諍聲有無常也不諍無常者是聲之無常非瓶無常故云也周記云諸無似立者此言倒也應云諸似立無也云云問且就法差別如何可勘付耶答見無常法自相下意許聲無常若顯立聲無常者可無同喻故只云無常所勘付耳此先德案也已上此答意付周記所作也問明燈抄云依理門論者或是所立一分義故此即宗中一分有法以為因故立敵不許是故還成兩俱不成乃至設難量云煙能有火以是煙故猶如餘煙乃至今觀此量皆以宗中一分有法為因喻也準理門旨如此皆是兩俱不成過攝何故今云諸無似立此過相故豈深窮此義應思之今如此文案疏意云諸無似立此過相故者無以同喻為宗因喻立量云也而此煙能有火以是煙故猶如餘煙之量以一法為宗因喻也何無諸似立中無此過相答更可思且有二釋一云諸無似立等者如周記説無約法自相改因作法故不可依抄義矣二今疏意非謂諸似立無以一法為宗因喻之作法然如是似立不成真能破故云諸無似立等不妨此量有兩俱不成也為言次文云設許上説皆為過者即一切量無正因者故於似立不見其過皆是似破至下當知云云意何答設許此上二能違皆為真能破者即一切量無正因者所以者何決然道理因喻之上分別所不用之義顛倒付過故云也明燈抄云準理門旨此言無義既以宗中一分有法為因皆是兩俱不成既許為過豈一切量無正因者也云云此文不爾今疏意非謂取宗一分為因似能破量無過故還無正因之者只可謂正因之上狼藉付失更無正因者也為言已上法自相相違作法了文明十一年己亥三月十三日於東大寺清涼院書寫畢二明末學大法師延意
