body:
  text: 四種相違略私記卷下釋真興集文云論此因如能至俱決定故述曰此成違義有二初二句牒彼先立因遮有非實謂有一實有德業因如前所説能成有性遮是實等等德及業後三句顯此因亦能令彼有法自相相違謂指於前如是此因亦能成立遮彼有性而非有性云云此約有法自相相違明所違能違合釋也初二句下釋所違也後三句下釋能違也如文可知之論文有五句約彼分初後也次文云謂前宗言有性非實有性是前有法自相今立量云所言有性應非有性有一實故有德業故如同異性同異能有於一實等同異非有性有性能有於一實等有性非有性云云此舉所違宗正作能違量也言同異能有等下例破也謂雖同異性有於一實等然非有性例知雖有性有於一實等亦可非有性為言問且約有法自相相違令闕後二相作能違方何答有性者有法自相也非實者法自相也以非實言見有法有性是離實大有性也而同喻同異性是離實同異性非離實大有性望有法宗成宗異品有一實故等因轉彼同無異有闕後二相故作能違云有性等如文可知闕後二相之樣亦有一樣也次文云釋所由云此因既能遮有性非實等亦能遮有性非是大有性兩俱決定故云云此釋俱決定故之言也所由者故之義所以之義也意云所以此因為所違能違成因者能成有性非實宗亦能成有性非有性兩宗俱決定故為言明燈抄云師資並成故云俱決定云云文云問今難有性應非有性如何不犯自語相違云云此問起意何答此就有法自相之能違量所起難也意云宗有法中云有性者實德業上非無之義名為有性此即立敵共同所成今難有性非是有性豈不自語相違之過為言次文云答若前未立有性非實今難實等能有非有此言乃犯自語相違亦違自教彼先已成非實之有今即難彼破他違他非成諸過云云此其答也意云前立宗中既言有性非實等明知離實等有名為有性今尋意許難於言顯是故不犯自語相違等為言問何故答中加自教相違答問中略故必可有故加也問此二差別何答弟子實等非無云有性之人也而今云有性非有性故為自語相違如云我母應石女也自教相違者立實等不無計有性人今云有性應非有性已違自教如勝論云聲常也問其破他等文意何答此通伏難也難云弟子不許離實大有之人也而言指大有有性非有性者豈不犯所別不成等耶今通云為破於他就他宗立雖有所別所依不成而不為過為言重意云唯為破他曾不顧自譬如入軍陳中之人也為言第一問答了文云問於因三相是何過耶云云此問意何答此問顯闕後二相之由也此問每四種相違皆有之次文云答彼立宗言有性非實有性言是有法自相彼説離實有體能有實之大有其同異性雖是離實等有體能有而非大有雖因同法便是所立宗之異品離實大有雖無同品有一實因同品非有於其異品同異之上遍皆隨轉此亦是因後二品過於同品無異品有故云云此答文也如文可悉之第二問答畢文云問若爾立聲為無常宗聲體可聞瓶有燒見其瓶與聲應成異品若許為異不但違論亦一切宗皆無同品云云此問意何答此問乘次上答文來也若爾者難上答之詞也意云大有體離實能有實等同異性亦離實能有實等故為同喻也而若云同異性雖離實等能有實等而非大有故為大有成異喻者如立聲無常聲是聞非燒見瓶是燒見非可聞其瓶與聲可成異品若許成異喻非但違論説聲無常判正因又一切量可無同喻為言或本云皆無異品云云且不可依之周前記以同品為或本後記以異品為或本也以云同品可為正順文相故也次文云答豈不已説其聲之體非所諍故聲上無常是所成立瓶既同有故是同品彼説離實有體有性為宗有法以有一實因所成立同異既非離實有體之有性故成於異品云云此答也豈不已説者指上聲論師為法自相能違又作能違釋其量非本意之處也此答意云以所立同法方為同品其聲體非本所立聲上無常方是所諍所立無常於瓶亦有故為同品今此量者師主立離實有體有性為宗有法以有一實等因成立而同異性以非離實大有故成異品為言有清記文第三問答了文云問前論説云與所立法均等義品説名同品但言所立法均等有名之為同不説有法均等名同品如何説有有法自相相違耶云云此問意何答此問乘次上問之答來也意云上答中云彼説離實有體有性為宗有法同異既非離實有性故成異品云云今就此答發此問也謂若言離實有性為宗有法同異性非離實有性故為異品者此論上説同品云謂所立法均等義品説名同品云云異品翻之但望所立法説同品異品非望有法而何今望有法定同品異品以同異性勘成異品云有有法自相相違耶為言次文云答今若但以有性與同異為同品可如所責違前論文既以離實有性而為同品亦是宗中所立法均等有故有此過無違論理云云此答也意云若但有法有性與同異性相對定判同品以同異性望有法有性非同品故勘成異品可如所責違前論文而既云有性非實其非實言顯有性離實有體為此離實有體以同異性為同品故亦是宗中所立法均等而有然顯失之時還成異喻故有此失不違論文為言文雖頗隱義意必然也此答中諸人就文相致疑曾不被欺之邑記云此答意云若但以有法有性與同異性同故名同品即非所立法均等義品可如所責其本量意立離實有性即以離實正為所立同異離實故是所立均等義品得成有法自相相違過也云云有清記文不如此文斷云今解意立實等上不無之有為有法定非是實等言非實等者是離實等有義為法望此即為所立故理門論云此中若品與所立法鄰近均等説名同品此論亦云云何名為同品異品謂所立法均等義品説名同品不望有法名同異品如是方便成立有法因喻既返故成相違云云可誦之問若言望所立離實法宗以同異性為同品亦勘成異品付過者可名法自相相違何名有法自相答其約量有二種或以法成法謂聲無常等量也或以法成有法謂此有性非實量也今此以非實法成立有法有性之離實義是還相違故云有法自相相違故斷云如是方便成立有法因喻既返故成相違云云又本量不加言故名有法自相若加言時即名法自相也意云本量只云有性非實隨此能違亦云有性非有性是依本量不加言約能違偏難有法故云有法自相相違也若本量加言云有性離實有性之時作能違亦難能別云有性非離實有性故是云法自相相違也故斷云望不加言名有法自相若加言已即名為法云云第四問答了文云問有性既為有法自相離實有性是其差別有一實因便是有法差別之因如何今説為自相過云云此問意何答此乘上答來問也意云上云既以離實有性而為同品等就此文發此問也謂若言以離實有正為所立者有性既為有法自相非是所諍離實有性是其差別即為所諍有一實因便是有法差別之因如何今説為自相過耶為言次文云答彼宗意許離實有性實是差別言陳有性既是自相今非此言陳即是違自相故自相過非差別因若不爾者極成所別皆無此過違自宗故云云此答也意云離實有性雖是差別云有性非實之時既是言陳自相今難此言陳自相故自相失非差別因若不難言陳離實有性最初極成之所別無此有法自相失亦難極成所別即違自宗故為言故斷云若直言大有有法不成為此但言有性泛爾言有彼此俱成以為有法不須分別即離言非實等為法以弟子有即實今言非實違他順已故得為宗由此故知離實等有雖是意許言有之時即言所顯離言所顯有外更無別有云云諸記文無用也又古德云尋意許難言陳云有法自相相違云云今案尤非乖疏斷意故有法自相中意許無用故也第五問答了文云問若難離實之大有性所別所依犯自不成亦犯違宗隨一不成若難不離實等大有而非有性既犯相符亦違自教彼豈非有云云此問意何答此乘上問之答來也意云上答中云今非此言陳即是違自相等云云依此答發此問也謂若言非言陳故是自相失者約其言陳自相立敵所立各別若難師主所立離實大有者即有四失一弟子舉離實大有云有性故有自所別不成失二大有是弟子所不立故無有法所依即因有自所依不成失三弟子不立離實大有而舉宗云大有即違自宗四以有法上義為因故有一實因即成大有故有自隨一不成為言若舉即實有難非有性者即有二失一師主已成即實有非有故有相符失二弟子立即實有之人也而今云非有即違自教為言周前記云隨一不成者若實等非無為有有一實因是有體隨一若取大有為有有一實因是無體隨一云云後記云隨一不成者通宗因二又含宗中隨一所別又是因中隨一所依不成故云云可略之問上既作今難有性應非有性如何不犯自語相違等之問答顯難有性非有性無失之由畢何更致此問耶答爾也無失之由上已釋了今乘此上答文假敘問詞以其答文正顯正義畢也但此問中若難離實等文有用上未述故若難不離實等文無用同於今難有性等之文故也故纂云今謂法師此意言有假敘如是若論弟子唯難離實之大有性等云云次文云答彼先總説今亦總難彼既成立離實之有故今難令有非此有言同意別故無諸過云云此答也明燈抄云彼勝論師為其五頂總言有性今亦總難彼有性故彼既成立離實之有故今難彼離實大有令非大有言同意別故無諸過言同意別者有性言是同而意內難非實之有故云別也云云問就彼前總説今亦總難之文若爾師主奄含即實離實總立弟子奄含即實離實總難歟答若依周記意者爾也故其文云立者奄含説即實離實之有今敵者難有性亦奄含難等云云今謂不爾違斷文云誰言五頂有性含即離等之文故今云彼前總説者不分別離實即實泛爾言有性是云總説然云非實時即離實大有悉顯了言今亦總難不分別離實即實泛爾難也然難彼師主所立自然成難離實大有為言言同意別之義蓋以如此也問其故無諸過答意何答雖有所別所依等過然不為過故云無諸過也如斷之第六問答畢上來六箇問答生起次第展轉如此之深可知此由也已上有法自相畢文云論有法差別至作有緣性述曰下文亦三此即初二標名舉宗因云云此下明有法差別相違也如文可知問先有法差別相違作法如何答四相違中都無若斯之難義何輒知之一云以前有法自相作法即為有法差別作法也問何故無別量答若云有別量者有四失即一違論失謂論中不別出故二亦違論失謂論説此有法差別未云如遮實等俱決定故何有別量耶三違疏失謂以有一實等因為一因違二之作法若有別量既違此理也四亦違疏失謂文云有性言陳有法自相作有緣性作非有緣性是自相上意許差別等云云何云有別量耶已上一義一云必有別量謂先量改能別云作有緣性也問若爾如何可遮前四難耶答第一難不爾論文略故更不別出如周記會也第二難亦不爾疏釋如遮實等俱決定故云勝論此因既成有性遮非實等而作有緣性此因亦遮有性非作有緣性此如彼遮兩皆決定等云云此文意云有法自相相違所違能違俱用遮言俱用非言故此有法差別相違不爾唯約能違量用遮言故為成遮義以遮言可為證故為言如遮有性非實之詞亦遮有性非作大有緣性言如遮實等俱決定故也非謂云爾故不成作有緣性之言陳既云成有性遮非實等而作有緣性明知能成作有緣性也第三難亦不爾謂有性之量所成立者離實大有言顯諍自相意許諍別義前後之量能別雖改三支是同所詮不殊豈非一因違二耶第四難亦不爾謂有性言陳有法自相等者是尤爾也有性之上有此差別故任道理案立前量所有意許差別也但成立此有性言陳有法自相上之意許差別之時必可別立意許之量若乍前量如何得成其差別乎不妨有性之上有此差別但為成此差別必可有改能別之量也問若無別量有何失答若無別量即有七失一云違論失謂論云如即此因即於前宗有法差別作有緣性云云此文明有一實等因能成作有緣性之言陳也若此作有緣性即是作大有緣性者既無同喻為成何物云如即此因耶如之言者是言略也其下必可有成立之言如疏説之二違疏失謂文云此言有無之有乃至若作大有緣性能別不成等云云定知有以作有緣性為能別之量也有云此文明設顯意許立量之詞非謂有別量今謂不爾曾無所見故三亦違疏失謂文釋闕後二相云有性有緣性因本所成有法差別等云云此若非彼量更云何量耶四違斷失謂文云以有為有法作有緣性為法故等云云有云此為破璧公非自義今謂不爾專無所據故五違周記失謂彼文作問答有二釋以有別作法為勝云云六違明燈抄失謂其文云言陳作有緣性云云七違理失謂雖云成有法之量正所諍者是則能別法若留有法即諍差別如何得言如是成立於有法甚無用故也問若爾何故論中略之答以實言之雖有性上有此差別立者未成立之時不知有意許之由若立者為成樂為之宗作差別量之時以作有緣性為法自相其下意許作大有緣性作非大有緣性之差別故敵者知得其意即得顯失若無作有緣性之能別何知有法之上有意許差別乎問若云作有緣性法自相下有意許差別者是法差別何云有法差別答有二義一望不加言名有法差別意云所謂任本量未別立之時也二云猶名有法差別故文云然成此法意成有法等云云具如斷也已上兩義後義殊勝雖然未熟之人先可學前義廣學之後可用後義努力努力不可忽諸之文云此言意説彼勝論立大有句義有實德業云云此先明勝論本計也如文可知之次文云實德業三和合之時同起詮言詮三為有同起緣智緣三為有云云此文意云大有句義與實德業三和合之時大有起能詮言詮是實是德是業即為有三起能緣智知是實是德是業即為有三詮言即詮三種各別之名緣智即緣三種各別之體也次文云實德業三為因能起有詮緣因即是大有大有能有實德業故云云此文意云實德業三為起能詮言及能緣智之因大有句義為有能詮言及能緣智之因所以者何為詮緣實德業大有能起詮言及緣智故約起言智實等為因依大有有實等即能起詮緣實等之心故約有詮緣大有為因是皆境引心之義也實等為大有成因大有為心成因展轉如此也次文云十句論説同句義云何謂有有性何等為有性謂與一初實德業句義和合一切根所取於實德業有詮智因是名有性云云此引十句論釋有性之文為詮也十句論勝論弟子惠月造也明燈抄云同句體者謂實德業體性非無能詮能緣之因名同此體即是舊大有性諸法同有故名為同俱舍論云總同句義也一切根所取者唯言根所取不言心所取者且約有境義論根能取境因根果識識者心也依根而住從強論故故先舉根所取也云云周記同之邑記云彼以五大為眼等根以覺等及現比智行為心根云云總意云大有是與實等和合為緣大有諸根及心之所緣境性為有能詮緣實等之能詮能緣心心所之因是名有性為言斷云即是許有是緣有心所取境性等云云以此文可釋根所取之言次文云智謂能緣云云此疏主釋上智字也詮智之智也次文云彼下又説如是有性定非所作常無德無動作無細分亦爾有實德業除同有能無能俱分異所和合一有同詮緣因云云此又引十句論釋為證也十句論以諸門釋十句義中釋有性有五門故彼正文云如是有性為是所作為非所作定非所作如非所作常無德無動作無細分亦爾云云即一所作非所作門中定非所作體常住故此門簡實句也二常無常門中定是常非所作故此門簡子孫等三有德無德門中定無德非德所依故此門又簡實句四有動作無動作門中定無動作自體不動故此門簡德業五有細分無細分門中定無細分體是一故此門簡同異性也若依明燈抄簡九實也亦爾者易知之有實德業者如文除同等者簡不詮緣之物也同者即同句義諸法同有故名為同自體不有自體故除之有能句者實等和合造各同果決定所須也無能句者實等和合不造餘果決定所須也俱分句者舊名同異性實等三性及彼一義和合地性色性取性等也亦同亦異故名俱分也異句者常於實轉依一實是遮彼覺因及表此覺因也以上五句有性所不有故除之所和合者實德業也言一有同詮緣因者有性此所和合實等同一能有為有能詮能緣之因也為言唯識疏云同體是一實德業三同一有故云云得此文意可訓之問十句中何故不除無説句和合句答無説句者無體故不論除不除邑記文也約和合句諸説不同也今謂不可除此有二解一不可除者約大有詮緣實等有與力不障義故何以知者大有與實等和合之時能起詮緣故和合句亦為詮緣之因若離和合力不能起詮緣故大有與實等和合是即和合之與力也故十句論云和合句是一切實德業同異有能無能俱分生至因同詮緣相云云明知同句以和合為因豈云除耶大有合力故也二不可除者和合句即以所和合為自體無別體故不云除也問就後義有二難一云若云和合句以實等為體故不可除者何彼宗云有別體常一乎二若云和合以實等為體者大有有實等即為有和合豈云大有有和合耶答以實言之和合句義實等為體曾無別體然為立六句計有別體西明云和合句者能令實等不離相屬即用此法為其自性云云略纂云和合句者無別名體云云大都案彼宗和合與實等不即不離謂能所別故不即也體性一故不離也以能所別計有別體以體性一不云除彼猶如四大與子孫也故無先二難也然此兩義愚管所推猶未審詳更可尋之然諸記中釋此所和合言極以多周後記云意舉所和合顯能和合等云云清記有三義第一義顛倒也第二義同周邑亦爾第三云所字不知所從云云隨如此記古德之説參差皆未見十句論也文云彼鵂鶹仙以五頂不信離實德業別有有故即以前因成立前宗言陳有性有法自相意許差別為有緣性云云此文意何答此文明師主為弟子更以前量意許重立量也明燈抄云前本量宗以有性與非實等不相離性為所立宗今所違量以有性與為有緣性不相離性為所立宗因喻同前云云邑記云謂彼作成立意許差別云有性能作有緣性有一實故如同異性彼立意者既能作有緣性故知有性非實德業令欲與彼作相違過故假敘之云云若據此邑記意者可謂敵者為勘顯意許差別作出本量主所作意許量也假敘之意蓋如此也次文云有性同異有緣性同詮言各別故彼不取云云此文意何答明燈抄云其大有句同起詮言詮三為有同起緣智緣三為有同異句義能同異彼實德業三乃至故云詮言各別故彼不取者謂但云有緣性不得云詮言同也故云不取詮言以有與同異別故云云後解略之別推云此文可云通伏難也難云有性同異俱為有能緣之性俱為有能詮之性何故唯取有緣之性為同品用宗法中不取有詮之性乎今通云有性同異俱為境性有能緣心實是雖同有能詮言彼此各別有性之上所起詮言詮有性體同異之上所起詮言詮同異體譬如山河俱為境性有能緣心彼此雖同有能詮言彼此各別山上所起詮表山體河上所起詮表河體有性同異亦復如是故取彼此同有緣之性為所立用同品不取彼此各別詮言也為言雖有諸記文意極難得也次文云心心所法是能緣性云云此文意何答此文明所緣大有等之能緣性也佛法外宗心與心所為能緣性也唯識疏云彼宗心心所即德句中覺樂等攝無常無礙云云次文云有緣謂境有能緣故謂境有體為因能起有緣之性若無體者心如何生以無因故緣無不生云云此文意何答此文釋作有緣性之言也明燈抄云有性若無有法非有有緣之智如何得生故有智生必賴有性由此有性非實德業所緣之境有能緣故名為有緣謂境有體為因能起有緣境界之性若無體者心如何生云云總意云有性為境有體能起緣有性之能緣心故有性名作有緣性為言斷云今諍大有與能緣有心作境性等云云正與此同也次文云如同異性有一實故作有緣性體非實等有性有一實亦作有緣性故知體亦非實德業云云此文意何答此明立者相例成量也邑云此述彼宗成立有緣性意云云燈抄釋作有緣性有二釋一云心及心法體是緣有性者從境為名名曰有緣二云其大有性能作有緣境界之性故言作有緣性云云可用後釋次文云此言有者有無之有非作境因有能緣性故非大有也若作大有緣性能別不成闕無同喻同異為喻所立不成云云此文意何答此釋論作有緣之有字也意云今立有性作有緣性之時此有緣之有者是有無之有也非為境因有能緣大有性若作大有緣性者對弟子時可有二失一弟子不立作大有緣性故有他能別不成能別不成故闕無同喻義如上釋之二設以同異性為同喻時同異性非作大有緣性故不成自所立宗故有自所立不成也問若爾此有性作有緣性之量言顯量歟意許量歟答此意許量也問若爾如何避失答雖意許量言陳必避失譬如法差別相違也言作有緣性者意許量之言陳也共許詞也一云清記云疏若作大有緣性能別不成等者問此據他宗唯是意許作大有緣性何故即他意許之有但是有無之有不許為大有答此據設遮他若成立有性為有緣性必不可作大有有緣性即犯能別不成由此故但意許以因成立不言陳也云云若依此記由有性上有意許弟子為作能違先顯出立者意許立量之時可云有性作有緣性若云作大有緣性犯能別不成等作出此量即牒取所違後作能違故故是意許量亦避失也非言顯量為言若依此者可云疏文案立弟子可顯立之量也古德多用此義今謂不爾次文云有性言陳有法自相作有緣性作非有緣性是自相上意許差別是故前因亦是有法差別之因是本諍故云云諍字或本作成字此文意何答此案立前有法自相有性言陳上有此作大有有緣性作非大有有緣性之意許差別也問若爾何立別量答此義不然前有法自相有性之處有此意許差別然為成立樂為之作大有緣性宗立意許量之時必改非實能別可用作有緣性之言其下有作大有緣性作非大有緣性之差別也今此文還案立前量所有之差別上文正述立意許量也故不相違也有古師云非實等宗中含作有緣性非實等作非有緣性非實等云云玄應破之具如燈抄及略纂之且約作有緣性之言有濫今先明之論云如即此因乃至作有緣性者是非作大有緣性是共許作有緣性也疏云此言有者有無之有者釋此論文也論次文云與此相違作非有緣性者即是作非大有緣性也論略大言也論中闕無作大有緣性之言也是省繁也璧法師以為論作有緣性者即作大有緣性故為斷所破也具如斷之疏此文云有法自相作有緣性作非有緣性者上下俱略大字俱是大有也餘處準知之能可沙汰此意之問且其作大有緣性作非大有緣性者其體何物答作大有緣性者離實大有性也約作非大有緣性者諸師之説甚多或云即實有也是依如理記師主有法差別之時亦立即實有性也故彼記云又可立即實有纂主不説非也云云一或云同喻同異性也是依立四分量法差別心心所法一剎那中定能自照云之法自相下有緣慮自照非緣慮自照之差別以同喻燈日等為不緣慮自照之差別相例言也二或云與立者意許別義相違之法也是依斷文云作有緣性是別義作非有緣性即義相違之文為證云也問就此傳纂云作有緣性作非有緣性各有別體云云何云義相違答其義云體無妨既此論云自相共相各付己體云云共相者此義也問要有二等方名差別若云義相違為差別有二等義耶答有也謂雖無物體有相違離實有之義其義即體故云有二等無難也三或云共許有也是依泛爾道理云也意云作有緣性作非有緣性各有別體雖違作有緣性作非有緣性存云云又要有二等方名差別云云必以立敵共許法可為片差別故以共許實等上能非無有為作非有緣性體之時作能違云有性非作大有有緣性之時雖被非離實大有共許之有替處不失言顯自相是以云差別相違故作非有緣性云共許有其理窮也四以之為勝也文云論亦能成立至俱決定故述曰此成違義有二初三句顯此因亦能令彼有法差別而作相違後二句釋所由云云自下明能違也如文可知之次文云作非有緣性者作非彼意許大有句義有緣之性謂即此因亦能成立與彼所立意許別義作有緣性差別相違而作非大有有緣之性云云此文意何答此釋能違量論文云亦能成立與此相違作非有緣性之文意也次文云同異有一實而作非大有有緣性有性有一實應作非大有有緣性云云此文意何答此文釋以同喻同異性例同令意許大有相違作能違之所以也意云同異性有一實等作同異有緣之性非大有有緣之性例知有性有一實等應作非大有有緣之性如同異性為言是則以同喻力證令成相違也明燈抄云釋成意云汝以同異有一實等同異非是實德業則證有一實等有性非是實德業故離實等作有緣性我以同異有一實等同異非有緣之性證知有性有一實等有性作非有緣之性彼此皆成故云俱決定也云云問爾約此有法差別相違量令闕後二相作能違方何答且有二方就長途義可云有性者有法自相此有法自相下為作有緣性作非有緣性者意許差別立者意許為立作大有緣性之宗而同喻同異性是同異有緣之性非大有有緣之性望意許宗成宗異品有一實故等因轉彼同無異有闕後二相故作能違云有性應非作大有緣性有一實故有德業故如同異性也就別解者作有緣性能別之下可有意許差別可思準之次文云不遮作有緣性但遮作大有有緣性故成意許別義相違云云此文意何答意云就能違量云有性應非作大有有緣性者不遮作有緣性但遮作大有有緣性所以者何作有緣性是共許詞故更不可遮作大有緣性是正樂為之宗故可遮彼故成相違為言次文云不爾違宗有性可作有緣性故云云此文意何答此成次上文也意云若不云不遮作有緣性但遮作大有有緣性直言遮作有緣性者弟子許實等上能非無有性為作有緣性若遮彼者即有違宗失為言次文云文言雖略義核定然云云此文意何答此文可云通伏難也謂或難云論文唯云作非有緣性而何今云但遮作大有有緣性更加大言耶故通云文言雖略等意云論文略故不具義必可然故加大言為言譬如法差別勝字也次文云釋所由云如遮實等俱決定故云云此牒論文也所由者成相違之所以也次文云勝論此因既成有性遮非實等而作有緣性此因亦遮有性非作有性有緣性此如彼遮兩皆決定故成違彼差別之因云云此文釋如遮實等俱決定故之文也問委意何答可有二意即一若依通途義者先有法自相之時有性非實等之時即顯作有緣性義故云既成有性遮非實等而作有緣性也今有法差別能違之時亦遮有性非作有性有緣性如遮非實等亦遮非作有緣性故云如遮實等俱決定故也二若約有別量者先有法自相之時云有性非實等自然成作有緣性義故今有法差別之時云有性作有緣性之時自然有遮非實義故云既成有性遮非實等而作有緣性如其成立遮非實等而作有緣性亦能遮非作有緣性故云如遮實等俱決定故也重意云此因雖成共許作有緣性為引遮言例成遮義云如遮實等非謂此因無成作有緣性之表義也問有法自相之時只云俱決定故何故今更加如遮實等言耶答明燈抄云前有審定略故不言此無審定故別指例以前準後應有指例以後準前應有審定論主善巧影略故也云云次文云此宗自相差別不定如前已説今此各以言陳為自意許為別故無妨難云云此文意何答此文總約四種相違宗遮難也設或難云判自性差別約自相共相者也故可有有法自相法差別何今云有有法差別法自相耶故今遮云此因明宗自相差別已以不定若以局通及前後者可如所難今各以言陳為自相以意許為差別故有法亦有差別法亦有自相故無妨難為言邑記云若以局通前後為自性差別即不得有四相違過前陳無差別後陳無自相故今取言許故無妨難云云周等記更不引之文云問於因三相是何過耶云云此問顯闕後二相也次文云答有性有緣性因本所成有法差別宗無同品因於遍無同異非有性有緣性是宗異品因於遍有有一實因同無異有後二相過故成相違云云此答也即意云有性作有緣性量本意為立作大有有緣性之宗而同異性非作大有有緣性故宗無同品同異性即成異品有一實故等因轉彼同無異有闕後二相故成相違為言文云問如聲論言聲應非作聲有緣性所作性故如瓶等亦應説是有法差別相違云云此問起意何答依次上文此問起也意云若云如同實性有一實而作非大有有緣性有性有一實應作非大有有緣性者佛弟子對聲論立聲無常之時聲論師謂云聲上有作聲有緣性非作聲有緣性意許差別而如瓶等所作性而非作聲有緣性聲所作性而應非作聲有緣性故作能違云聲應非作聲有緣性所作性故如瓶等此亦應有法差別相違耶為言次文云答彼自違宗故非彼過本亦不諍聲非作聲有緣性故彼似破攝云云此答也意云彼聲論云聲是所緣耳則能緣彼宗既言聲而返言聲上無能緣聲之心故即違自宗又聲上常無常為本所諍聲非作聲有緣性非是本諍故似破攝為言次文云如非聲有緣性如是應非擊發所生起等皆準此知云云此文逐遮餘似破也意云設謂聲上有擊發所生起非擊發所生起意許差別以瓶非擊發所生起作有法差別相違亦如破非聲所緣性之言皆準之知違自宗非本諍故悉似破攝為言邑記云若聲生為此難者彼犯違宗若聲顯難雖不違宗亦非本諍亦有世間相違之過故皆似破云云文云問又如彼言聲之無常應非作聲無常有緣性所作性故如瓶應是法差別相違云云此問意何答又彼聲論云聲無常下有作聲無常有緣性非作聲無常有緣性之意許差別而瓶非作聲無常有緣性故作法差別相違云聲無常應非作聲無常有緣性所作性故如瓶是可為真能破耶為言次文云答亦不然彼犯兩俱不成無常有法兩俱不許有所作性亦似破攝云云是答也明燈抄云聲之無常是則有法為因所依無常滅義所作生義生滅既異故所作因於滅不遍無常有法兩俱不許有所作性故兩俱不成過云云又云若準前者此亦違宗無常是所緣意識即能緣宗既言無常而返言無常無緣無常之心即違自宗乃至非是本諍故似破攝云云疏外加也次文云如是應非緣息無常等皆準此知云云此文又逐遮似破也意云設云聲無常下有緣息無常打破無常意許差別而瓶非緣息無常故作法差別相違皆可準知有兩俱不成故非真能破云云問其兩俱不成如何答如前無常有法不許遍所作因故有兩俱不成也已上四種大作法畢于時曆應二年正月三日於西新談義之屋書寫畢依此功永出六趣苦域託生九品淨剎南無春日權現慈悲萬行菩薩右筆沙門堯專後日一校了
